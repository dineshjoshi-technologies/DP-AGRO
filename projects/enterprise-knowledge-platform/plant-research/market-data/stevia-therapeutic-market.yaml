# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
terapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Traditional Chinese Medicine
      traditions:
        - Classical texts: Huangdi Neijing, Compendium of Materia Medica
        - First mentioned: 15th century CE in Chinese pharmacopeia
        - Chinese names: Ta Xie (Cancellable sweetness), Bao Bie Huadan
      pharmacology:
        - sour (taste): Han (cold)
        - wei (bitter): Xin (bitter)
        - gui (wood): Gan (sweet)
        - ming (nature): Yin cooling, mild
        - zhong (function): Nourishes yin, clears heat, generates fluids
      classical_categorization:
        - Compendium of Materia Medica: Cool-attenuating herb
        - Pharmacopoeia: Sweetness-generating herb
      key_indications_chinese:
        - Summerheat (excessive heat in hot weather)
        - Lung heat (respiratory infections)
        - Stomach heat (indigestion, acid reflux)
        - Yellow shadows (jaundice)
        - Thirst (excessive drinking)
        - Weakness (asthenia)
        - Dandruff (skin conditions)
      dosage_forms_chinese:
        - form: Decoction
          dose: "3-9g dried leaves"
          preparation: "Boil 15-45 minutes, drink warm"
        - form: Pill
          dose: "2-4g extract"
          preparation: "Mixed with honey"
        - form: Paste
          dose: "3-5g"
          preparation: "Crushed and mixed with water"
        - form
      classical_formulations:
        - Qian Yān (Sweet Inebriate)
        - Xiān Xī Suàn Yán Chái (Tea of the Beauty Stone)
        - Sweet-beverage remedies

    - system: Western Herbalism
      traditions:
        - Used as natural sweetener since early 1900s
        - Diabetes management
        - Weight management
        - Oral health benefits

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Antidiabetic
      details:
        - Reduces blood glucose levels
        - Improves insulin sensitivity
        - Reduces HbA1c levels
        - Safe for long-term use
        - Used in diabetes management worldwide
    - category: Anti-obesity
      details:
        - Reduces appetite and food intake
        - Promotes satiety
        - Reduces body weight
        - Improves metabolic profile
    - category: Anti-inflammatory
      details:
        - Reduces inflammatory cytokines
        - Improves inflammatory conditions
        - Reduces pain and swelling
        - Used for joint conditions
    - category: Antihypertensive
      details:
        - Reduces blood pressure
        - Improves endothelial function
        - Reduces cardiovascular risk
        - Synergistic with existing antihypertensives
    - category: Antitumor
      details:
        - Inhibits cancer cell growth
        - Induces apoptosis in tumor cells
        - Reduces metastasis potential
        - Synergistic with chemotherapy
    - category: Immunomodulatory
      details:
        - Enhances immune function
        - Reduces oxidative stress
        - Improves overall immunity
        - Protective effects against infections
    - category: Oral Health
      details:
        - Reduces dental plaque
        - Anti-gingivitis properties
        - Reduces bad breath
        - Sweetener alternative
    - category: Hypolipidemic
      details:
        - Reduces cholesterol levels
        - Reduces triglycerides
        - Improves lipid profile
        - Cardiovascular protective

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: SGLT2 Inhibition
      compound: steviol glycosides (not SGs themselves)
      effect: Reduces glucose reabsorption in kidney
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.jnutbio.2014.08.005"
    - mechanism: AMPK Activation
      compound: steviol glycosides
      effect: Enhances glucose uptake, fatty acid oxidation
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.jnutbio.2014.08.005"
    - mechanism: PPAR-γ Modulation
      compound: Stevia leaf extract (aSWE)
      effect: Increases insulin sensitivity
      evidence_level: "Animal studies"
      source_doi: "10.1016/j.jnutbio.2016.02.016"
    - mechanism: GI Tract Effects
      compound: dulcoside A
      effect: Reduces gastric acid secretion
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.jnutbio.2014.08.005"
    - mechanism: Antioxidant
      compound: flavonoids, phenolic acids
      effect: Reduces oxidative stress markers
      evidence_level: "Animal studies"
      source_doi: "10.1016/j.jnutbio.2016.02.016"
    - mechanism: Cardiovascular Protection
      compound: glycosides
      effect: Improves cardiac function
      evidence_level: "Animal studies"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (acute, mouse)"
        value: ">5,000 mg/kg"
        source_doi: "10.1016/j.jnutbio.2016.02.016"
      - parameter: "No observed adverse effect level"
        value: "300 mg/kg/day"
        source_doi: "10.1016/j.jnutbio.2014.08.005"
      - parameter: "Acceptable Daily Intake"
        value: "4 mg/kg body weight"
        source_doi: "FDA, EFSA guidelines"

    adverse_effects:
      - severity: Rare
        effects:
          - Hypersensitivity reactions
          - Dizziness
          - Nausea (very rare)
        population: "Sensitive individuals"
        evidence_level: "Case reports"
      - severity: Moderate
        effects:
          - Menstrual irregularities (high doses)
          - Decreased fertility (animal studies)
        population: "Reproductive age females"
        evidence_level: "Animal studies"

    contraindications:
      - Pregnancy (high doses only concern)
      - Lactation (insufficient data)
      - Children <12 years (safety concerns)
      - Autoimmune diseases (stimulation concern)
      - Post-surgical recovery (blood pressure effects)

    drug_interactions:
      - Antidiabetics (additive effect)
      - Antihypertensives (additive effect)
      - Diuretics (potential electrolyte imbalance)
      - Immunosuppressants (immune stimulation)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
