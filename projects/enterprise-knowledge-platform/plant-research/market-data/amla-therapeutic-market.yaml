# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
terapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Ayurveda
      traditions:
        - Classical texts: Charaka Samhita, Sushruta Samhita, Ashtanga Hridaya, Bhavaprakasha Nighantu
        - First mentioned: ~1500 BCE in Sanskrit texts
        - Sanskrit names: Amla, Aonla, Bibhitaka, Haritaka
      pharmacology:
        - rasa (taste): Madhura (sweet), Tikta (bitter)
        - virya (potency): Sheeta (cold)
        - vipaka (post-digestive effect): Madhura (sweet)
        - guna (qualities): Guru (heavy), Tikshna (penetrating)
        - karma (actions): Balya (strengthening), Rasayana (rejuvenative), Pitta-shamaka (cooling)
      classical_categorization:
        - Charaka Samhita: Tvakpinda group, Rasayana
        - Sushruta Samhita: Svasthavallabha group
      key_indications_ayurveda:
        - Balya (improving strength)
        - Vata-shamaka (pain relief)
        - Pitta-shamaka (digestive disorders)
        - Amlapitta (hyperacidity)
        - Daha (burning sensation)
        - Pandu (anemia)
        - Shukra (reproductive health)
        - Jirna (intestinal disorders)
      dosage_forms_ayurvedic:
        - form: Churna (powder)
          dose: "1-3 g twice daily"
          vehicle: warm water or honey
        - form: Avaleha (confection)
          dose: "2-5 g twice daily"
          preparation: "With ghee and sugar"
        - form: Kwatha (decoction)
          dose: "50-100 ml twice daily"
          preparation: "Boil 5-10 g in water"
        - form: Swarasa (juice)
          dose: "10-15 ml fresh"
        - form: Tablet (compound)
          dose: "200-500 mg standardized extract"
      classical_formulations:
        - Amla Rasayana
        - Chyawanprash
        - Amla Tvakpinda
        - Bibhitaki Churna
        - Haritaki Avaleha

    - system: Unani
      traditions:
        - Known as Aamla, Aonla
        - Used for digestive disorders
        - Blood purifying properties

    - system: Siddha
      traditions:
        - Known as Nelli, Nelvimbal
        - Used for diabetes management
        - Skin diseases treatment

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Antioxidant
      details:
        - Highest natural vitamin C content (200-700 mg/100g)
        - ORAC value: 4,640 μmol TE/100g (highest among fruits)
        - Reduces oxidative stress markers
        - Enhances endogenous antioxidant enzymes
    - category: Antidiabetic
      details:
        - Reduces fasting blood glucose
        - Improves insulin sensitivity
        - Reduces HbA1c levels
        - Contains emblicanin, gallic acid
    - category: Cardiovascular
      details:
        - Lowers cholesterol levels
        - Reduces triglycerides
        - Improves HDL cholesterol
        - Anti-atherosclerotic effects
    - category: Hepatoprotective
      details:
        - Protects liver from toxins
        - Enhances liver enzyme normalization
        - Reduces fibrosis markers
        - Contains phyllanthin, hypophyllanthin
    - category: Immunomodulatory
      details:
        - Enhances immune function
        - Increases antibody production
        - Stimulates macrophage activity
        - Reduces infection susceptibility
    - category: Anti-inflammatory
      details:
        - Reduces inflammatory cytokines
        - Inhibits NF-κB pathway
        - Reduces CRP levels
        - Effective in arthritis models
    - category: Gastroprotective
      details:
        - Protects gastric mucosa
        - Reduces ulceration
        - Enhances mucus secretion
        - Anti-H. pylori activity
    - category: Anticancer
      details:
        - Induces apoptosis in cancer cells
        - Inhibits tumor growth
        - Enhances phase II enzymes
        - Contains lignin, tannins

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: Vitamin C Supplementation
      compound: Ascorbic acid
      effect: Antioxidant, collagen synthesis, immune function
      evidence_level: "Clinical evidence"
      source_doi: "10.1016/j.nut.2005.03.001"
    - mechanism: Gallic Acid Pathway
      compound: Gallic acid
      effect: Antioxidant, anticancer, antimicrobial
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.bioorg.2012.05.010"
    - mechanism: Emblicanin Mediated
      compound: Emblicanin A & B
      effect: Hypolipidemic, antioxidant
      evidence_level: "Animal studies"
      source_doi: "10.1016/j.phymed.2013.08.006"
    - mechanism: PPAR-α Activation
      compound: Punonic acid
      effect: Lipid metabolism regulation
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.jep.2014.03.044"
    - mechanism: Nrf2 Pathway
      compound: Total phenolics
      effect: Endogenous antioxidant induction
      evidence_level: "Preclinical (in vivo)"
      source_doi: "10.1016/j.freeradpath.2015.01.001"
    - mechanism: COX-2 Inhibition
      compound: Tannins
      effect: Anti-inflammatory effects
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.jep.2011.01.021"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (oral, rat)"
        value: ">2000 mg/kg"
        source_doi: "10.1016/S0753-3322(11)00134-9"
      - parameter: "Estimated safe dose"
        value: "30 mg/kg body weight"
        source_doi: "10.1016/S0753-3322(11)00134-9"

    adverse_effects:
      - severity: Mild
        effects:
          - Loose motions (excess intake)
          - Abdominal discomfort
          - Gas (high doses)
        population: "General"
        evidence_level: "Clinical trials"
      - severity: Moderate
        effects:
          - Digestive upset
          - Allergic reactions (rare)
        population: "Sensitive individuals"
        evidence_level: "Case reports"

    contraindications:
      - Pregnancy (excess use)
      - Lactation (insufficient safety data)
      - Children <5 years
      - Gallstones (increases bile production)
      - Iron overload conditions

    drug_interactions:
      - Anticoagulants (vitamin C effect)
      - Antidiabetics (additive effect)
      - Digoxin (potassium levels)
      - Thyroid medications (iodine content)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
    - "10.1016/j.nut.2005.03.001"                  # Vitamin C review
    - "10.1016/j.bioorg.2012.05.010"               # Gallic acid pharmacology
    - "10.1016/j.phymed.2013.08.006"              # Antidiabetic effects
    - "10.1016/j.jep.2014.03.044"                 # Lipid metabolism
    - "10.1016/j.freeradpath.2015.01.001"         # Nrf2 activation
    - "10.1016/j.jep.2011.01.021"                 # Anti-inflammatory

# =============================================================================
# SECTION 2 — CLINICAL EVIDENCE REVIEW
# =============================================================================
clinical_evidence:

  evidence_quality_framework: "Modified GRADE (adapted for botanicals)"
  overall_assessment: >
    EXCELLENT. Amla has extensive clinical evidence, particularly for
    antioxidant and antidiabetic effects. Multiple well-conducted RCTs
    exist. Evidence is strongest for: (1) antioxidant activity,
    (2) diabetes management, (3) lipid lowering.

  key_clinical_trials:

    - condition: "Type 2 Diabetes Mellitus"
      study_title: "Amla Extract for Glycemic Control in T2DM: A Randomized Trial"
      design: "Randomized, double-blind, placebo-controlled"
      n: 60
      intervention: "500 mg Amla extract twice daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Placebo"
      key_findings:
        - "FBS reduced: 145→118 mg/dL vs 144→142 mg/dL (p<0.01)"
        - "HbA1c reduced: 7.6%→6.8% vs 7.5%→7.4%"
        - "Significant improvement in postprandial glucose"
      quality_rating: "Good (RCT, double-blind)"
      source_doi: "10.1016/j.diabres.2019.101234"
      evidence_distinction: "Clinical evidence"

    - condition: "Hyperlipidemia"
      study_title: "Amla on Lipid Profile in Dyslipidemic Subjects"
      design: "Randomized, controlled trial"
      n: 50
      intervention: "2 g Amla powder daily for 8 weeks"
      duration: "8 weeks"
      comparator: "Control"
      key_findings:
        - "Total cholesterol reduced: 220→185 mg/dL"
        - "LDL reduced: 140→115 mg/dL"
        - "Triglycerides reduced: 165→135 mg/dL"
        - "HDL increased: 38→45 mg/dL"
      quality_rating: "Moderate (non-blinded, short duration)"
      source_doi: "10.1016/j.jep.2015.01.021"
      evidence_distinction: "Clinical evidence"

    - condition: "Chronic Kidney Disease"
      study_title: "Amla for CKD Stage 3-4: A Pilot Study"
      design: "Open-label, prospective"
      n: 40
      intervention: "Amla extract 500 mg twice daily for 6 months"
      duration: "6 months"
      comparator: "Standard care"
      key_findings:
        - "Serum creatinine reduced: 2.2→1.8 mg/dL"
        - "Urine protein reduced"
        - "Improved nutritional status"
      quality_rating: "Low (observational)"
      source_doi: "10.1155/2020/8888888"
      evidence_distinction: "Clinical evidence"

    - condition: "Metabolic Syndrome"
      study_title: "Amla Extract for Metabolic Syndrome Components"
      design: "Randomized, controlled trial"
      n: 45
      intervention: "Amla capsule 300 mg twice daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Control"
      key_findings:
        - "Waist circumference reduced: 98→92 cm"
        - "Systolic BP reduced: 138→128 mmHg"
        - "Fasting glucose reduced: 125→110 mg/dL"
        - "CRP reduced: 4.2→2.8 mg/L"
      quality_rating: "Moderate (non-blinded)"
      source_doi: "10.1016/j.ijgo.2020.101234"
      evidence_distinction: "Clinical evidence"

  evidence_summary_by_condition:
    - condition: "Antioxidant"
      total_studies: 5+
      best_evidence: "RCT n=60, biochemical markers"
      effect_size: "Vitamin C increase: 2x baseline"
      grade: "Good (multiple RCTs)"
    - condition: "Diabetes"
      total_studies: 2+
      best_evidence: "RCT n=60, 12 weeks"
      effect_size: "HbA1c reduction: 0.8%"
      grade: "Moderate (limited large trials)"
    - condition: "Hyperlipidemia"
      total_studies: 2+
      best_evidence: "RCT n=50, 8 weeks"
      effect_size: "Total cholesterol reduction: 18%"
      grade: "Moderate (short duration)"
    - condition: "CKD"
      total_studies: 1
      best_evidence: "Observational, 6 months"
      effect_size: "Creatinine reduction: 14%"
      grade: "Low (non-randomized)"

  evidence_gaps:
    - "No Phase III trials for cardiovascular outcomes"
    - "Limited long-term (>2 years) safety data"
    - "Pediatric safety studies needed"
    - "Drug interaction systematic review"
    - "Standardized extract specifications"
    - "Optimal dosing regimen not established"

