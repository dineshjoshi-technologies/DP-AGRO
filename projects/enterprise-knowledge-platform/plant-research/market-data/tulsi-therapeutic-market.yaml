regulatory_status:

  india:
    - authority: "AYUSH (Ministry of Ayush)"
      status: "Regulated as traditional medicine under Drugs & Cosmetics Act, 1940"
      approved_claims: "Therapeutic claims when marketed as Ayurvedic drug (ASU category)"
      restrictions: "Must be manufactured under GMP license from State/Central Drug Controller"
      classification: "Classical Ayurvedic herb; included in Ayurvedic Pharmacopoeia"
      notes: "Multiple formulations in Central Council for Research in Ayurvedic Sciences (CCRAS) list"
    - authority: "FSSAI (Food Safety and Standards Authority of India)"
      status: "Permitted botanical under Health Supplements Regulations, 2016"
      approved_claims: "Structure/function claims only (immune support, antioxidant)"
      restrictions: "No disease claims on food products; requires product approval"
      max_permitted_levels: "By product approval; no universal MPL"
      notes: "Widely used in traditional products; well-documented safety profile"

  united_states:
    - authority: "FDA (Food and Drug Administration)"
      regulatory_pathway: "Dietary Supplement under DSHEA 1994"
      premarket_approval: "Not required"
      approved_claims: "Structure/function claims only"
      gras_status: "Not established as GRAS (food additive)"
      drug_status: "Not FDA-approved as a drug"
      restrictions: "Cannot market as diagnosis/treatment without NDA"
      ndi_requirements: "New Dietary Ingredient notification may apply"
      fda_warning: "FDA has not evaluated tulsi supplements for safety/effectiveness"
      notes: "Generally recognized as safe in food-grade usage"

  european_union:
    - authority: "EMA (European Medicines Agency) / HMPC"
      regulatory_pathway: "Traditional Herbal Medicinal Product (THMPD) or food supplement"
      thmp_requirements: "30 years traditional use (including 15 years in EU)"
      approved_claims: "THMP registration for specific traditional uses"
      status: "Some products marketed as food supplements; limited THMP approvals"
    - authority: "EFSA (European Food Safety Authority)"
      status: "Not on Novel Food list"
      restrictions: "Novel food authorization if no history of consumption before May 1997"
      permitted_use: "Food supplement use under certain conditions"

  japan:
    - authority: "MHLW (Ministry of Health, Labour and Welfare)"
      status: "Not listed in Japanese Pharmacopoeia; regulated as food additive"
      restrictions: "Limited use; some extracts in dietary supplements"

  china:
    - authority: "NMPA (National Medical Products Administration)"
      status: "Not listed in Chinese Pharmacopoeia"
      notes: "Growing research interest; limited commercial products"

  iucn_cites:
    iucn_status: "Least Concern"
    cites: "Not listed (unrestricted international trade)"
    source: "Plants of the World Online; IUCN Red List"

  patent_landscape:
    summary: >
      Over 150+ patents related to tulsi bioactives globally (PatSnap analysis).
      Key patent clusters: (1) Standardized extract formulations,
      (2) Novel delivery systems for eugenol/rosmarinic acid,
      (3) Combination therapies with conventional drugs.
    major_patent_holders:
      - Tata Trusts
      - Council of Scientific & Industrial Research (CSIR, India)
      - Patanjali Ayurved Ltd
      - Himalaya Drug Company
      - National Research Centre for Queen Anne's Crest (India)
    recent_patents:
      - patent_id: US20220194180A1
        title: "Standardized Tulsi Extract Composition and Uses"
        assignee: "Council of Scientific & Industrial Research"
        year: 2022
        focus: "Fixed-dose combination with metformin"
      - patent_id: WO2022149077A1
        title: "Nanoparticle-based Tulsi Extract Delivery System"
        assignee: Patanjali Ayurved Ltd
        year: 2022
        focus: "Improved bioavailability of eugenol"
    freedom_to_operate: >
      Moderate. Base compounds (eugenol, rosmarinic acid) are not patentable
      as natural products; however, specific formulations, extracts,
      and delivery systems are covered by active patents.

