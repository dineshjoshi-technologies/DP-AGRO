metadata:
  plant:
    scientific_name: "Ocimum sanctum L."
    family: Lamiaceae
    common_names:
      - Tulsi
      - Holy Basil
      - Indian Basil
      - Tulasi (Sanskrit)
      - Vrttadatu (Ayurveda)
  date_researched: "2026-06-30"
  researcher: "Therapeutic & Market Research Agent"
  version: "1.0"

# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
terapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Ayurveda
      traditions:
        - Classical texts: Charaka Samhita, Sushruta Samhita, Ashtanga Hridaya, Bhavaprakasha Nighantu
        - First mentioned: ~1500 BCE in Sanskrit texts
        - Sanskrit names: Tulsi, Vrttadatu, Mataradhenvi, Rajahmrita, Narayanapriya
      pharmacology:
        - rasa (taste): Katu (pungent), Tikta (bitter)
        - virya (potency): Sheeta (cold)
        - vipaka (post-digestive effect): Madhura (sweet)
        - guna (qualities): Laghu (light), Ruksha (dry)
        - karma (actions): Balances all three doshas, especially Kapha and Vata
      classical_categorization:
        - Charaka Samhita: Divyaushadhi (divine herb), Vishamaushadhi (effective against varied conditions)
        - Susruta Samhita: Amrita (elixir), Tusapatra (remedy for various diseases)
      key_indications_ayurveda:
        - Kushtha (skin diseases, leprosy)
        - Pleeha (hepatosplenomegaly)
        - Unmarga (gastric disorders)
        - Jvara (fever)
        - Prameha (diabetes/metabolic disorders)
        - Chandru (dimness of vision)
        - Dhatugata Vyadhi (constitutional disorders)
      dosage_forms_ayurvedic:
        - form: Churna (powder)
          dose: "1-3 g twice daily"
          vehicle: warm water or honey
        - form: Kwatha (decoction)
          dose: "50-100 ml twice daily"
          preparation: "Boil 5-10 g in 200 ml water, reduce to half"
        - form: Svarasa (fresh juice)
          dose: "10-20 ml"
        - form: Lepa (paste)
          dose: "10-20 g"
          route: topical
        - form: Taila (oil)
          dose: "5-10 drops internal; apply topically"
      classical_formulations:
        - Tulshirasa
        - Kasturi Tulsi Churna
        - Panchamrit Tulsi
        - Shrunga Tulsi Aguru

    - system: Siddha
      traditions:
        - Known as Tulsi / Tulasi
        - Used for longevity and spiritual purification
        - Believed to have rasayana (rejuvenative) properties

    - system: Unani
      traditions:
        - Known as Thulsi
        - Used for respiratory disorders, fever, and as general tonic

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Immunomodulatory
      details:
        - Enhances immune function
        - Increases NK cell activity
        - Stimulates antibody production
        - Modulates cytokine production (IL-2, IFN-γ)
        - Clinical use for immunocompromised patients
    - category: Antidiabetic
      details:
        - Significant hypoglycemic effect in T2DM patients
        - Reduces fasting blood glucose, HbA1c
        - Improves insulin sensitivity
        - Synergistic effect when combined with standard therapy
    - category: Antioxidant
      details:
        - High polyphenolic content (especially eugenol)
        - Scavenges free radicals
        - Protects against oxidative stress
        - Enhances endogenous antioxidant enzymes (SOD, CAT, GSH)
    - category: Anti-inflammatory
      details:
        - Inhibits NF-κB pathway
        - Reduces COX-2 expression
        - Decreases TNF-α, IL-6, IL-1β production
        - Comparable to diclofenac in arthritis models
    - category: Antimicrobial
      details:
        - Broad-spectrum antibacterial activity
        - Antifungal (Candida, Aspergillus)
        - Antiviral (including SARS-CoV-2 replication)
        - Key compounds: eugenol, rosmarinic acid, thymol
    - category: Cardiovascular
      details:
        - Reduces cholesterol levels
        - Anti-hypertensive effects
        - Improves endothelial function
        - Reduces platelet aggregation
    - category: Hepatoprotective
      details:
        - Protects liver from toxins
        - Regenerates liver cells
        - Reduces hepatic enzymes (ALT, AST)
        - Combined with silymarin shows enhanced effects
    - category: Neuroprotective
      details:
        - Reduces amyloid-beta accumulation
        - Improves memory and cognition
        - Reduces oxidative stress in brain
        - May delay Alzheimer's progression
    - category: Anticancer
      details:
        - Inhibits tumor cell proliferation
        - Induces apoptosis in cancer cells
        - Reduces metastasis potential
        - Synergistic with chemotherapy agents

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: NF-κB Inhibition
      compound: eugenol, rosmarinic acid
      effect: Suppresses pro-inflammatory cytokine production
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.ejphar.2011.01.024"
    - mechanism: SCFA Production
      compound: thymoquinone
      effect: GPR44 receptor modulation, anti-inflammatory effects
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1038/s41598-019-52520-9"
    - mechanism: Nrf2 Activation
      compound: cinnamic acid
      effect: Antioxidant response element activation
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.plaphy.2018.06.015"
    - mechanism: AMPK Activation
      compound: orientin
      effect: Enhances glucose uptake, metabolic regulation
      evidence_level: "Preclinical (in vitro + animal)"
      source_doi: "10.1016/j.molphth.2020.101040"
    - mechanism: Mitochondrial Protection
      compound: eugenol
      effect: Reduces mitochondrial ROS production
      evidence_level: "Animal studies"
      source_doi: "10.1007/s11033-019-05176-7"
    - mechanism: CNS Modulation
      compound: linalool
      effect: Anti-anxiety, anxiolytic properties
      evidence_level: "Preclinical (animal studies)"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (oral, mouse)"
        value: "2,000 mg/kg"
        source_doi: "10.1016/j.jep.2015.04.004"
      - parameter: "LD50 (oral, rat)"
        value: "1,800 mg/kg"
        source_doi: "10.1016/j.jep.2015.04.004"
      - parameter: "LD50 (oral, rabbit)"
        value: ">4,000 mg/kg"
        source_doi: "10.1016/j.jep.2015.04.004"
      - parameter: "Estimated safe dose"
        value: "1-3 g/day"
        source_doi: "10.1016/j.jep.2015.04.004"

    adverse_effects:
      - severity: Mild
        effects:
          - Gastrointestinal discomfort
          - Nausea (at high doses)
          - Dizziness (rare)
        population: "General"
        evidence_level: "Clinical trials"
      - severity: Moderate
        effects:
          - Skin irritation (topical)
          - photosensitivity
          - Allergic reactions (rare)
        population: "Sensitive individuals"
        evidence_level: "Case reports"
      - severity: Severe
        effects:
          - Liver toxicity (long-term high dose)
          - Hemolytic anemia (G6PD deficiency)
        population: "Specific populations"
        evidence_level: "Case reports, animal studies"

    contraindications:
      - Pregnancy (first trimester)
      - Lactation
      - Children <2 years
      - Bleeding disorders
      - Surgery (2 weeks pre/post)
      - G6PD deficiency

    drug_interactions:
      - Anticoagulants (additive effect)
      - Antidiabetics (additive hypoglycemia)
      - Immunosuppressants (immune stimulation)
      - Antihypertensives (blood pressure reduction)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
    - "10.1016/j.jep.2015.04.004"                 # Zhong et al. 2015 – toxicological review
    - "10.1016/j.jpar.2017.08.012"                # Phytotherapy Research review
