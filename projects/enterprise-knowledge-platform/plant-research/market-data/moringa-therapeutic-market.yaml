# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
terapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Ayurveda
      traditions:
        - Classical texts: Charaka Samhita, Sushruta Samhita, Bhavaprakasha Nighantu
        - First mentioned: 16th century in Sanskrit texts
        - Sanskrit names: Moringa, Murungai, Karanjan, Kansarai
      pharmacology:
        - rasa (taste): Madhura (sweet), Tikta (bitter)
        - virya (potency): Sheeta (cold)
        - vipaka (post-digestive effect): Madhura (sweet)
        - guna (qualities): Laghu (light), Snigdh (oleorous)
        - karma (actions): Pacifies Vata, Pitta, Kapha doshas; nourishing
      classical_categorization:
        - Charaka Samhita: Vrikshayurveda group
        - Sushruta Samhita: Fast-growing nourishing tree
      key_indications_ayurveda:
        - Balya (strengthening/tonic)
        - Rasayana (rejuvenative)
        - Pandu (anemia)
        - Ama (toxins)
        - Kamala (jaundice)
        - Pravara (menstrual disorders)
        - Shotha (inflammation)
      dosage_forms_ayurvedic:
        - form: Pataka (tablet)
          dose: "250-500 mg dried seed powder"
          preparation: "With honey or warm water"
        - form: Kwatha (decoction)
          dose: "25-50 ml twice daily"
          preparation: "Boil 5-10 g leaves in water"
        - form: Swaras (juice)
          dose: "10-15 ml fresh juice"
        - form: Ghrita (ghee)
          dose: "1-2 g with ghee"
          preparation: "Medicated ghee preparation"
        - form: Basti (enema)
          dose: "1-2 tablespoons"
          route: "Rectal administration"
      classical_formulations:
        - Murungai Patamruta
        - Moringa Kalpa
        - Drumstick Leaf Thailam
        - Moringa Ghrita

    - system: Siddha
      traditions:
        - Known as Murungai, Muringam
        - Used for snake bite antidote
        - Blood purifying properties

    - system: Unani
      traditions:
        - Known as Muringa, Bone tree
        - Used for fever, diabetes
        - Cardiac tonic

    - system: Traditional Chinese Medicine
      traditions:
        - Used for nourishing blood and yin
        - Diaphoretic properties
        - Menstrual regulation

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Hematopoeitic / Anemia
      details:
        - Rich in heme iron, folate, vitamin C
        - Increases hemoglobin, red cell count
        - Effective in iron deficiency anemia
        - Comparable to iron sulfate with fewer side effects
    - category: Antioxidant
      details:
        - Highest antioxidant capacity among leafy vegetables
        - ORAC value: 675.7 μmol TE/100g
        - Neutralizes free radicals
        - Reduces oxidative stress markers
    - category: Anti-inflammatory
      details:
        - inhibits COX-2, LOX pathways
        - Reduces TNF-α, IL-6 levels
        - Effective in arthritis models
        - Comparable to hydroxychloroquine in lupus models
    - category: Antidiabetic
      details:
        - Lowers fasting blood glucose
        - Improves insulin sensitivity
        - Reduces HbA1c levels
        - Contains isothiocyanates with glucose-lowering activity
    - category: Cardiovascular
      details:
        - Lowers cholesterol and triglycerides
        - Reduces blood pressure
        - Improves lipid profile
        - Antioxidant protection against atherosclerosis
    - category: Cancer Chemoprevention
      details:
        - Induces apoptosis in cancer cells
        - Inhibits tumor growth
        - Enhances phase II detoxification enzymes
        - Contains naphthoquinoline derivatives
    - category: Gastroprotective
      details:
        - Protects against gastric ulcers
        - Increases mucus secretion
        - Reduces acid secretion
        - Anti-H. pylori activity
    - category: Immunomodulatory
      details:
        - Enhances macrophage activity
        - Increases IgA, IgG, IgM levels
        - Stimulates lymphocyte proliferation
        - Effective in immunocompromised states
    - category: Bone Health
      details:
        - Contains calcium, phosphorus, magnesium
        - Enhances bone mineral density
        - Reduces osteoporosis risk
        - Stimulates osteoblast activity

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: Nrf2 Pathway Activation
      compound: isothiocyanates, flavonoids
      effect: Upregulates antioxidant enzyme expression
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.foodchem.2016.02.011"
    - mechanism: PPAR-γ Modulation
      compound: oleiflowerin
      effect: Improves insulin sensitivity, lipid metabolism
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.phymed.2018.03.018"
    - mechanism: COX-2 Inhibition
      compound: quercetin, kaempferol
      effect: Reduces inflammation, pain
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.jep.2014.01.021"
    - mechanism: Angiogenesis Inhibition
      compound: napsin, moringin
      effect: Tumor growth suppression
      evidence_level: "Preclinical (in vivo)"
      source_doi: "10.1016/j.biocel.2015.05.003"
    - mechanism: Glucose Transporter Modulation
      compound: isothiocyanates
      effect: Enhances GLUT-4 translocation
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.molnutritionfood.2017.04.001"
    - mechanism: Lipid Metabolism Regulation
      compound: naphthoquinone
      effect: Reduces cholesterol synthesis
      evidence_level: "Animal studies"
      source_doi: "10.1016/j.ijfoodmicro.2016.03.012"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (leaf extract, oral, mouse)"
        value: "2,000 mg/kg"
        source_doi: "10.1016/S0271-5317(12)00101-6"
      - parameter: "LD50 (seed, oral, rat)"
        value: "3,200 mg/kg"
        source_doi: "10.1016/S0271-5317(12)00101-6"
      - parameter: "Estimated safe dose"
        value: "500 mg dried leaf powder/day"
        source_doi: "10.1016/S0271-5317(12)00101-6"

    adverse_effects:
      - severity: Mild
        effects:
          - Diarrhea (high doses)
          - Gas/bloating
          - Nausea
        population: "General"
        evidence_level: "Clinical trials"
      - severity: Moderate
        effects:
          - Allergic skin reaction (topical)
          - Eye irritation (sap contact)
        population: "Sensitive individuals"
        evidence_level: "Case reports"
      - severity: Severe
        effects:
          - Hepatotoxicity (seed consumption in large quantities)
          - Cyanide poisoning (seed kernels - theoretical)
        population: "Infants, high-dose consumers"
        evidence_level: "Animal studies"

    contraindications:
      - Pregnancy (uterine stimulant effects)
      - Lactation ( Insufficient safety data)
      - Children <5 years (risk of choking)
      - Epilepsy (theoretical convulsant effects)
      - Bleeding disorders (potential antiplatelet effect)

    drug_interactions:
      - Anticoagulants (theoretical additive effect)
      - Antidiabetics (additive hypoglycemic effect)
      - Antihypertensives (blood pressure reduction)
      - Immunosuppressants (immune stimulation)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
    - "10.1016/j.foodchem.2016.02.011"               # Antioxidant capacity
    - "10.1016/j.phymed.2018.03.018"               # PPAR-γ modulation
