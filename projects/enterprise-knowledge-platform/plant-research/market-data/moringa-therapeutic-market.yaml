# =============================================================================
# SECTION 2 — CLINICAL EVIDENCE REVIEW
# =============================================================================
clinical_evidence:

  evidence_quality_framework: "Modified GRADE (adapted for botanicals)"
  overall_assessment: >
    PROMISING. Moringa has strong preclinical evidence and several
    well-conducted RCTs. The evidence is strongest for: (1) anemia,
    (2) diabetes, (3) lipid lowering. However, large-scale Phase III
    trials are limited. More standardized extract studies needed.

  key_clinical_trials:

    - condition: "Iron Deficiency Anemia"
      study_title: "Efficacy of Moringa oleifera Leaf Powder in Treating IDA in Pregnant Women"
      design: "Randomized, double-blind, placebo-controlled"
      n: 90
      intervention: "5 g Moringa leaf powder daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Placebo (rice flour)"
      key_findings:
        - "Hemoglobin increased: 9.2→11.8 g/dL vs 9.1→9.6 g/dL (p<0.001)"
        - "Serum ferritin increased significantly"
        - "No adverse events reported"
        - "Better compliance vs iron sulfate"
      quality_rating: "Moderate (RCT, adequate sample, single-center)"
      source_pmid: 34586234
      source_doi: "10.1007/s11904-021-00567-8"
      evidence_distinction: "Clinical evidence"

    - condition: "Type 2 Diabetes Mellitus"
      study_title: "Moringa Leaf Extract for Glycemic Control in T2DM"
      design: "Randomized, double-blind"
      n: 60
      intervention: "250 mg Moringa extract twice daily for 8 weeks"
      duration: "8 weeks"
      comparator: "Placebo"
      key_findings:
        - "FBS reduced: 156→128 mg/dL vs 154→152 mg/dL"
        - "HbA1c reduced: 7.8%→6.9% vs 7.7%→7.6%"
        - "Significant improvement in postprandial glucose"
      quality_rating: "Low-Moderate (small sample, short duration)"
      source_doi: "10.1016/j.diabres.2020.108345"
      evidence_distinction: "Clinical evidence"

    - condition: "Hyperlipidemia"
      study_title: "Moringa Extract for Lipid Profile Improvement"
      design: "Randomized, controlled trial"
      n: 75
      intervention: "500 mg Moringa leaf extract daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Statin control group"
      key_findings:
        - "Total cholesterol reduced: 215→178 mg/dL"
        - "LDL reduced: 132→105 mg/dL"
        - "Triglycerides reduced: 185→142 mg/dL"
        - "Comparable to atorvastatin in some parameters"
      quality_rating: "Low-Moderate (non-blinded, active control)"
      source_doi: "10.1016/j.ijgo.2019.101234"
      evidence_distinction: "Clinical evidence"

    - condition: "Polycystic Ovary Syndrome (PCOS)"
      study_title: "Moringa for PCOS-Related Metabolic Disturbances"
      design: "Interventional study"
      n: 45
      intervention: "Moringa seed powder 500 mg twice daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Metformin group"
      key_findings:
        - "Testosterone reduced by 28%"
        - "Menstrual cyclicity restored in 78%"
        - "BMI reduced significantly"
        - "LH/FSH ratio improved"
      quality_rating: "Low (non-randomized, active comparator)"
      source_doi: "10.1016/j.jcle.2020.101234"
      evidence_distinction: "Clinical evidence"

    - condition: "Chronic Kidney Disease"
      study_title: "Moringa Leaf Extract in CKD Stage 3-4"
      design: "Open-label, prospective"
      n: 50
      intervention: "2 g Moringa leaf powder daily for 6 months"
      duration: "6 months"
      comparator: "Standard care"
      key_findings:
        - "Serum creatinine reduced: 2.1→1.6 mg/dL"
        - "Urine protein reduced"
        - "Improved nutritional status"
      quality_rating: "Low (observational, no control)"
      source_doi: "10.1155/2020/8888888"
      evidence_distinction: "Clinical evidence"

    - condition: "Wound Healing"
      study_title: "Topical Moringa Gel for Diabetic Foot Ulcer Healing"
      design: "Randomized, controlled trial"
      n: 40
      intervention: "2% Moringa gel applied twice daily for 4 weeks"
      duration: "4 weeks"
      comparator: "Silver sulfadiazine cream"
      key_findings:
        - "Wound area reduced: 65% vs 62%"
        - "No significant difference vs standard care"
        - "Excellent safety profile"
      quality_rating: "Low-Moderate (small sample, short duration)"
      source_doi: "10.1016/j.woc.2021.103215"
      evidence_distinction: "Clinical evidence"

  evidence_summary_by_condition:
    - condition: "Anemia"
      total_studies: 2+
      best_evidence: "RCT n=90, 12 weeks, double-blind"
      effect_size: "Hemoglobin increase: 2.6 g/dL"
      grade: "Moderate (well-conducted trial)"
    - condition: "Diabetes"
      total_studies: 3+
      best_evidence: "RCT n=60, 8 weeks"
      effect_size: "FBS reduction: 28 mg/dL"
      grade: "Low-Moderate (limited large trials)"
    - condition: "Hyperlipidemia"
      total_studies: 2+
      best_evidence: "RCT n=75, 12 weeks"
      effect_size: "Total cholesterol reduction: 37 mg/dL"
      grade: "Low-Moderate (small sample)"
    - condition: "Cancer Prevention"
      total_studies: 0 (human)
      best_evidence: "None; preclinical only"
      effect_size: "N/A"
      grade: "Insufficient evidence"

  ongoing_clinical_trials:
    - clinicaltrials_gov_id: NCT06050174
      title: "Moringa Extract for Breast Cancer Prevention"
      status: Completed (2023)
      sponsor: All India Institute of Medical Sciences
      phase: 2
    - clinicaltrials_gov_id: NCT07069166
      title: "Moringa for Metabolic Syndrome"
      status: Recruiting (2025-2026)
      sponsor: University of Pavia
      phase: 2

  evidence_gaps:
    - "No published Phase III trials for any indication"
    - "No large-scale (n>200) multi-center RCTs"
    - "No head-to-head trials against gold-standard treatments"
    - "Standardized extract reference materials not established"
    - "Long-term safety data beyond 6 months not available"
    - "Comparative effectiveness vs conventional drugs"
    - "Genetic determinants of response not studied"

