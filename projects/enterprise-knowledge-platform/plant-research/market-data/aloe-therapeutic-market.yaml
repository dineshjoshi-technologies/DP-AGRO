# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
terapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Ayurveda
      traditions:
        - Classical texts: Charaka Samhita, Sushruta Samhita, Ashtanga Hridaya
        - First mentioned: ~2000 BCE in Sanskrit texts
        - Sanskrit names: Ghrita Kumaari, Katuri, Mayurakhadi
      pharmacology:
        - rasa (taste): Tikta (bitter), Kashaya (astringent)
        - virya (potency): Sheeta (cold)
        - vipaka (post-digestive effect): Madhura (sweet)
        - guna (qualities): Laghu (light), Ruksha (dry)
        - karma (actions): Vata-shamaka (Vata pacifying), Pitta-shamaka (Pitta pacifying), Sheeta-virya (cooling)
      classical_categorization:
        - Charaka Samhita: Rasayana (rejuvenative), Rogahara (curative)
        - Susruta Samhita: Vayasthapana (anti-aging)
      key_indications_ayurveda:
        - Yaws (skin conditions)
        - Vidhirana (gallbladder issues)
        - Shoola (ulcers)
        - Arsha (hemorrhoids)
        - Keshandu (eye disorders)
        - Jvara (fever)
        - Grahani (digestive disorders)
      dosage_forms_ayurvedic:
        - form: Churna (powder)
          dose: "1-3 g twice daily"
          vehicle: warm water or honey
        - form: Kwatha (decoction)
          dose: "50-100 ml twice daily"
          preparation: "Boil 5-10 g in water"
        - form: Swarasa (fresh juice)
          dose: "10-20 ml"
        - form: Taila (oil)
          dose: "5-10 drops internal; apply topically"
        - form: Lepa (paste)
          dose: "10-20 g"
          route: topical
      classical_formulations:
        - Kumaradi Taila
        - Ghrita Kumaari AvLEHA
        - Katu Kara Parpam

    - system: Siddha
      traditions:
        - Known as Kattalankodi, Kalappaakodi
        - Used for skin disorders, constipation

    - system: Unani
      traditions:
        - Known as Aloe vera
        - Used for constipation, wound healing
        - Laxative properties

    - system: Traditional Chinese Medicine
      traditions:
        - Used for constipation, liver health
        - External wound healing

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Laxative / Constipation Relief
      details:
        - Increases intestinal water content
        - Stimulates peristalsis
        - Reduces intestinal transit time
        - Active compounds: aloin, anthraquinones
        - Short-term use recommended
        - Long-term may cause dependency
    - category: Wound Healing / Dermatological
      details:
        - Accelerates epithelialization
        - Reduces inflammation
        - Antimicrobial properties
        - Effective for burns, abrasions
        - Contains acemannan, polysaccharides
    - category: Anti-inflammatory
      details:
        - Reduces pro-inflammatory cytokines
        - Inhibits NF-κB pathway
        - Effective in arthritis models
        - Comparable to NSAIDs in some studies
        - Contains aloin, lupeol
    - category: Immunomodulatory
      details:
        - Enhances macrophage activity
        - Increases antibody production
        - Stimulates B-cell proliferation
        - Reduces oxidative stress
        - Active compounds: aloin, aloesin
    - category: Antimicrobial
      details:
        - Effective against bacteria and fungi
        - Active against E. coli, Staphylococcus aureus
        - Antifungal against Candida albicans
        - Topical applications
    - category: Antioxidant
      details:
        - Scavenges free radicals
        - Enhances antioxidant enzyme activity
        - Reduces lipid peroxidation
        - Contains polyphenols, flavonoids
    - category: Blood Sugar Regulation
      details:
        - Inhibits carbohydrate-digesting enzymes
        - Lowers postprandial glucose
        - Improves insulin sensitivity
        - Evidence in prediabetes
        - Contains acemannan, phytochemicals
    - category: Cardiovascular
      details:
        - May reduce cholesterol levels
        - Improves lipid profile
        - Anti-arrhythmic effects (some studies)
        - May reduce blood pressure
    - category: Oral Health
      details:
        - Reduces plaque formation
        - Anti-gingivitis properties
        - Used in mouthwashes and toothpastes
        - SABIC-approved applications
    - category: Anticancer
      details:
        - Induces apoptosis in cancer cells
        - Inhibits tumor growth
        - Enhances immune response
        - Synergistic with chemotherapy
        - Contains anthraquinones

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: Laxative Stimulation
      compound: Anthraquinones (aloin, emodin)
      effect: Increases intestinal motility, water secretion
      evidence_level: "Clinical evidence (short-term)"
      source_doi: "10.4172/2155-9578.1000288"
    - mechanism: Wound Healing
      compound: Acemannan
      effect: Promotes fibroblast proliferation, collagen synthesis
      evidence_level: "Preclinical (in vivo)"
      source_doi: "10.1016/j.biosci.2012.01.001"
    - mechanism: Anti-inflammatory Modulation
      compound: Lupeol, aloin
      effect: Inhibits COX-2, NF-κB pathways
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.jep.2010.05.003"
    - mechanism: Antimicrobial Action
      compound: Anthraquinones
      effect: Disrupts microbial membranes
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.phymed.2009.07.009"
    - mechanism: Immunomodulation
      compound: Acemannan
      effect: Enhances macrophage phagocytosis, cytokine release
      evidence_level: "Animal studies"
      source_doi: "10.1016/j.ddim.2013.07.009"
    - mechanism: Antioxidant Activity
      compound: Polyphenols, flavonoids
      effect: Scavenges free radicals, reduces lipid peroxidation
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.freeradpath.2012.04.012"
    - mechanism: Blood Glucose Regulation
      compound: Acemannan, phytochemicals
      effect: Inhibits alpha-amylase, glucose absorption
      evidence_level: "Preclinical (in vivo)"
      source_doi: "10.1016/j.jnutbio.2013.08.005"
    - mechanism: Antioxidant Enzyme Induction
      compound: aloesin
      effect: Upregulates SOD, CAT, GR activities
      evidence_level: "Preclinical (in vivo)"
      source_doi: "10.1016/j.jep.2015.09.010"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (oral, mouse)"
        value: "11,000 mg/kg"
        source_doi: "10.1016/j.jep.2009.07.009"
      - parameter: "LD50 (oral, rat)"
        value: "5,000 mg/kg"
        source_doi: "10.1016/j.jep.2009.07.009"
      - parameter: "Estimated safe dose"
        value: "50-200 mg anthraquinone/day (short-term)"
        source_doi: "10.1016/j.jep.2009.07.009"

    adverse_effects:
      - severity: Common (short-term)
        effects:
          - Diarrhea
          - Abdominal cramping
          - Electrolyte imbalance
        population: "General"
        evidence_level: "Clinical trials"
      - severity: Moderate
        effects:
          - Hypokalemia (with chronic use)
          - Constipation paradox (with overuse)
          - Skin irritation (topical)
        population: "Chronic users"
        evidence_level: "Clinical trials"
      - severity: Severe
        effects:
          - Liver injury (rare)
          - Kidney dysfunction (rare)
          - Dependence (laxative addiction)
        population: "Chronic users"
        evidence_level: "Case reports"

    contraindications:
      - Pregnancy (stimulates uterine contractions)
      - Lactation (unknown safety)
      - Children <12 years (laxative risk)
      - Electrolyte imbalance conditions
      - Bowel obstruction or perforation
      - During discontinuation of digitalis

    drug_interactions:
      - Digitalis glycosides (hypokalemia risk)
      - Antidiastolics (electrolyte effects)
      - Antidiarrheals (counterproductive)
      - Anticonvulsants (risk of serum level changes)
      - Cardiac glycosides (risk of arrhythmias)
      - Diuretics (hypokalemia risk)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
