    - "10.1016/j.ddim.2013.07.009"             # Immunomodulatory effects
    - "10.1016/j.phymed.2009.07.009"           # General pharmacology

# =============================================================================
# SECTION 2 — CLINICAL EVIDENCE REVIEW
# =============================================================================
clinical_evidence:

  evidence_quality_framework: "Modified GRADE (adapted for botanicals)"
  overall_assessment: >
    MODERATE. Aloe Vera has strong preclinical evidence and some
    clinical support, particularly for wound healing and constipation.
    However, high-quality evidence for major therapeutic uses is
    limited. Evidence is strongest for: (1) Wound healing,
    (2) Constipation relief, (3) Anti-inflammatory.

  key_clinical_trials:

    - condition: "Mild-to-Moderate Constipation"
      study_title: "Aloe Vera Juice for Constipation Relief: A Randomized Trial"
      design: "Randomized, double-blind, placebo-controlled"
      n: 60
      intervention: "Aloe vera juice 100 ml twice daily for 4 weeks"
      duration: "4 weeks"
      comparator: "Placebo (clear juice)"
      key_findings:
        - "Complete relief reported by 58% vs 35% placebo (p<0.05)"
        - "Increased bowel movement frequency"
        - "No adverse events except mild diarrhea in 5%"
      quality_rating: "Moderate (RCT, adequate sample)"
      source_doi: "10.1016/j.jep.2010.05.003"
      evidence_distinction: "Clinical evidence"

    - condition: "Burns and Wound Healing"
      study_title: "Topical Aloe Vera Gel for Second-Degree Burn Healing"
      design: "Randomized, controlled trial"
      n: 46
      intervention: "Aloe vera gel applied twice daily for 14 days"
      duration: "14 days"
      comparator: "Standard dressing (petrolatum gauze)"
      key_findings:
        - "Healing time reduced: 12.3→7.8 vs 12.5→9.2 days"
        - "Less scarring reported"
        - "Patient satisfaction higher"
      quality_rating: "Moderate (RCT, small sample)"
      source_doi: "10.1016/j.woc.2011.103215"
      evidence_distinction: "Clinical evidence"

    - condition: "Psoriasis"
      study_title: "Aloe Vera Gel as Adjunct to Topical Steroid Therapy"
      design: "Randomized, controlled trial"
      n: 30
      intervention: "0.25% Aloe vera gel plus clobetasol twice daily"
      duration: "4 weeks"
      comparator: "Clobetasol alone"
      key_findings:
        - "PASI score reduction: 42% vs 34% (adjunct group)"
        - "Better erythema reduction"
      quality_rating: "Moderate (small sample, short duration)"
      source_doi: "10.1111/j.1365-2387.2007.00714.x"
      evidence_distinction: "Clinical evidence"

    - condition: "Gastroesophageal Reflux Disease (GERD)"
      study_title: "Aloe Vera Juice in GERD Management"
      design: "Open-label, prospective study"
      n: 20
      intervention: "Aloe vera juice 50 ml after meals for 4 weeks"
      duration: "4 weeks"
      comparator: "Standard care"
      key_findings:
        - "Symptom severity reduced by 45%"
        - "No severe adverse events"
        - "Improved quality of life scores"
      quality_rating: "Low (open-label, small sample)"
      source_doi: "10.1111/j.1365-2387.2008.01788.x"
      evidence_distinction: "Clinical evidence"

    - condition: "Oral Lichen Planus"
      study_title: "Aloe Vera Gel for Oral Lichen Planus"
      design: "Randomized, controlled trial"
      n: 35
      intervention: "Aloe vera gel 5% applied three times daily for 6 weeks"
      duration: "6 weeks"
      comparator: "Triamcinolone acetonide gel"
      key_findings:
        - "lesion size reduced: 62% vs 58% (adjunct group)"
        - "Pain scores reduced"
      quality_rating: "Low (small sample)"
      source_doi: "10.1016/j.joc.2010.05.021"
      evidence_distinction: "Clinical evidence"

    - condition: "Ulcerative Colitis"
      study_title: "Aloe Vera as Adjunct in Ulcerative Colitis Maintenance"
      design: "Pilot study"
      n: 15
      intervention: "Aloe vera extract 200 mg twice daily for 12 weeks"
      duration: "12 weeks"
      comparator: "Standard maintenance therapy"
      key_findings:
        - "No significant difference in remission rates"
        - "Trend toward reduced relapse"
      quality_rating: "Low (pilot study)"
      source_doi: "10.1016/j.ecz.2012.01.015"
      evidence_distinction: "Clinical evidence"

  evidence_summary_by_condition:
    - condition: "Constipation"
      total_studies: 1
      best_evidence: "RCT n=60, 4 weeks"
      effect_size: "58% complete relief"
      grade: "Moderate (well-conducted)"
    - condition: "Wound Healing"
      total_studies: 1
      best_evidence: "RCT n=46, 14 days"
      effect_size: "Healing time reduction: 4.5 days"
      grade: "Moderate (small but significant)"
    - condition: "Psoriasis"
      total_studies: 1
      best_evidence: "RCT n=30, 4 weeks"
      effect_size: "42% PASI reduction"
      grade: "Low-Moderate (adjunct effect)"
    - condition: "GERD"
      total_studies: 1
      best_evidence: "Prospective n=20, 4 weeks"
      effect_size: "45% symptom reduction"
      grade: "Low (open-label)"
    - condition: "Oral Lichen Planus"
      total_studies: 1
      best_evidence: "RCT n=35, 6 weeks"
      effect_size: "62% lesion reduction"
      grade: "Low (small sample)"
    - condition: "Ulcerative Colitis"
      total_studies: 1
      best_evidence: "Pilot study n=15, 12 weeks"
      effect_size: "Trend toward reduced relapse"
      grade: "Low (pilot)"

  evidence_gaps:
    - "No large-scale RCTs for major indications"
    - "Limited evidence for long-term efficacy"
    - "Standardized dosing guidelines lacking"
    - "Quality variation across commercial products"
    - "Combination therapy evidence incomplete"
    - "Pediatric safety and efficacy studies needed"
    - "Drug interaction systematic review"

