# =============================================================================
# SECTION 2 — CLINICAL EVIDENCE REVIEW
# =============================================================================
clinical_evidence:

  evidence_quality_framework: "Modified GRADE (adapted for botanicals)"
  overall_assessment: >
    PROMISING. Neem has consistent preclinical evidence and several well-conducted
    RCTs in oral health and diabetes. However, only ~5-15 interventional trials
    are registered globally, most for oro-dental conditions. No published Phase II/III
    results for systemic diseases (oncology, metabolic disease at scale). The evidence
    base is strongest for: (1) type 2 diabetes mellitus, (2) psoriasis, (3) oral health
    (plaque, gingivitis, periodontitis).

  key_clinical_trials:

    - condition: "Type 2 Diabetes Mellitus"
      study_title: "Evaluation of Aqueous Neem Extract on Glycemic Control, Endothelial Dysfunction and Systemic Inflammation in T2DM"
      design: "Randomized, double-blind, placebo-controlled"
      n: 80
      intervention: "Standardized aqueous extract of neem leaves and twigs (NEEM): 125, 250, 500 mg BID"
      duration: "12 weeks"
      comparator: "Placebo (on background metformin)"
      key_findings:
        - "PPBS reduced: 205.9→159.3 mg/dL (500 mg BID)"
        - "FBS reduced: 120.7→97.3 mg/dL (500 mg BID)"
        - "HbA1c reduced: 7.78%→6.26% (500 mg BID)"
        - "Insulin resistance reduced: 4.6→2.0 (HOMA-IR)"
        - "Significant improvement in endothelial function, oxidative stress, systemic inflammation"
        - "No effect on platelet aggregation or lipid profile"
        - "All doses well-tolerated; dose-response trend observed"
      quality_rating: "Moderate (RCT, single-center, adequate sample size)"
      source_pmid: 33244247
      source_doi: "10.1007/s12013-020-00951-0"
      evidence_distinction: "Clinical evidence"

    - condition: "Psoriasis"
      study_title: "Neem extract in mild-to-moderate psoriasis"
      design: "RCT"
      n: 50
      intervention: "Neem extract 3 capsules/day"
      duration: "12 weeks"
      comparator: "Placebo (alongside coal tar regimen)"
      key_findings:
        - "Significant reduction in PASI score vs control"
        - "Faster and better response vs placebo group"
      quality_rating: "Moderate (RCT, single-center, no active comparator)"
      source_doi: "Referenced in Discover Plants 2025 review"
      evidence_distinction: "Clinical evidence"

    - condition: "Chronic Periodontitis with T2DM"
      study_title: "Locally delivered 10% Neem gel as adjunct to SRP"
      design: "Split-mouth RCT"
      n: 15 (30 sites)
      intervention: "10% Azadirachta indica gel + scaling/root planing (SRP)"
      duration: "3 months"
      comparator: "SRP alone"
      key_findings:
        - "Significant improvement in clinical parameters"
        - "Reduction in P. gingivalis, T. denticola, T. forsythia"
        - "Reduction in HbA1c at 3 months"
      quality_rating: "Low-Moderate (small sample, split-mouth design)"
      source_doi: "10.21276/ijmrhs.2020.9.5.02"
      evidence_distinction: "Clinical evidence"

    - condition: "Periodontitis"
      study_title: "Neem extract gel as adjunct to non-surgical periodontal management"
      design: "RCT, Phase 2"
      n: 32
      intervention: "Azadirachta indica gel local drug delivery"
      duration: "Completed Jul 2023"
      status: Completed
      clinicaltrials_gov_id: NCT06050174
      quality_rating: "Moderate (Phase 2, randomized, but not blinded)"
      evidence_distinction: "Clinical evidence"

    - condition: "Plaque and Gingivitis"
      study_title: "Neem containing toothpaste on plaque and gingivitis"
      design: "Randomized, double-blind"
      n: 30
      intervention: "Neem-containing toothpaste"
      duration: "30 days"
      comparator: "Placebo toothpaste"
      key_findings:
        - "Statistically significant reduction in Plaque Index (PI)"
        - "Statistically significant reduction in Gingival Index (GI)"
      quality_rating: "Moderate (RCT, small sample, short duration)"
      source_doi: "10.5005/jp-journals-10024-1776"
      evidence_distinction: "Clinical evidence"

    - condition: "Plaque and Gingivitis"
      study_title: "Comparative evaluation of 2% neem mouthwash vs 0.2% chlorhexidine"
      design: "Randomized, double-blind, crossover"
      n: 40
      intervention: "2% neem mouthwash"
      duration: "15 days per phase"
      comparator: "0.2% chlorhexidine gluconate mouthwash"
      key_findings:
        - "Neem and chlorhexidine both significantly reduced GI scores"
        - "No statistically significant difference between groups"
        - "Comparable anti-plaque efficacy"
      quality_rating: "Moderate (RCT, single-center)"
      source_doi: "10.5005/jp-journals-10024-2085"
      evidence_distinction: "Clinical evidence"

    - condition: "Gastric Ulcer"
      study_title: "Neem bark extract antisecretory and antiulcer effects"
      design: "Clinical study (non-randomized)"
      n: Not specified in available abstracts
      intervention: "Lyophilised bark extract powder 30-60 mg BID"
      duration: "6-10 weeks"
      key_findings:
        - "77% reduction in gastric acid secretion at 30 mg BID"
        - "Complete duodenal ulcer healing at 30-60 mg BID for 10 weeks"
        - "Complete esophageal and gastric ulcer healing at 30 mg BID for 6 weeks"
      quality_rating: "Low (non-randomized, historical)"
      evidence_distinction: "Clinical evidence"

  evidence_summary_by_condition:
    - condition: "Type 2 Diabetes"
      total_studies: 3+
      best_evidence: "RCT n=80, 12 weeks, double-blind, placebo-controlled"
      effect_size: "HbA1c reduction 1.52% (500 mg BID)"
      grade: "Low-Moderate (limited number of RCTs, single-center)"
    - condition: "Psoriasis"
      total_studies: 2+
      best_evidence: "RCT n=50, 12 weeks"
      effect_size: "Significant PASI reduction"
      grade: "Low-Moderate (no active comparator)"
    - condition: "Oral Health (plaque/gingivitis)"
      total_studies: 5+
      best_evidence: "Multiple RCTs, n=30-40, double-blind"
      effect_size: "Comparable to 0.2% chlorhexidine"
      grade: "Moderate (consistent findings, but small sample sizes)"
    - condition: "Oncologic"
      total_studies: 0 (human)
      best_evidence: "None; preclinical only"
      effect_size: "N/A"
      grade: "Insufficient evidence"

  ongoing_clinical_trials:
    - clinicaltrials_gov_id: NCT06050174
      title: "Azadirachta Indica Extract as Adjunct to Non-Surgical Periodontal Management"
      status: Completed (2023)
      sponsor: Ain Shams University
      phase: 2
    - clinicaltrials_gov_id: NCT07069166
      title: "Para-Probiotic Oral Care in Periodontal Patients With Type 2 Diabetes"
      status: Recruiting (2025-2026)
      sponsor: University of Pavia
      note: "Not neem-specific; reference for periodontal-diabetes research"

  evidence_gaps:
    - "No published Phase II/III trials for systemic cancers"
    - "No large-scale (n>200) multi-center RCTs for any indication"
    - "No head-to-head trials against gold-standard treatments at clinical scale"
    - "Pharmacokinetic data (bioavailability, tissue distribution) in humans is minimal"
    - "Standardized extract reference materials not established"
    - "Long-term safety data beyond 12-16 weeks not available"
    - "Most dermatological claims (acne, eczema) extrapolated from in vitro data"

