metadata:
  plant:
    scientific_name: "Azadirachta indica A. Juss."
    family: Meliaceae
    common_names:
      - Neem
      - Nimba (Sanskrit)
      - Margosa
      - Indian Lilac
      - Azad-Darakht-e-Hindi (Urdu/Unani)
      - Vemmu / Vembu (Siddha)
      - Nim Pa (Tibetan)
  date_researched: "2026-06-29"
  researcher: "Therapeutic & Market Research Agent"
  version: "1.0"

# =============================================================================
# SECTION 1 — THERAPEUTIC APPLICATIONS
# =============================================================================
therapeutic_applications:

  # --- Traditional Medicine Systems ---
  traditional_medicine_systems:
    - system: Ayurveda
      traditions:
        - Classical texts: Charaka Samhita, Sushruta Samhita, Ashtanga Hridaya, Bhavaprakasha Nighantu
        - First mentioned: ~1500 BCE in Sanskrit texts
        - Sanskrit names: Nimba, Pichumanda, Arishta, Tiktaka, Paribhadra, Hinguniryasa
      pharmacology:
        - rasa (taste): Tikta (bitter), Kashaya (astringent)
        - virya (potency): Sheeta (cold)
        - vipaka (post-digestive effect): Katu (pungent)
        - guna (qualities): Laghu (light), Ruksha (dry)
        - karma (actions): Pacifies Kapha and Pitta doshas; Vata aggravating in excess
      classical_categorization:
        - Charaka Samhita: Kandughna (anti-pruritic group), Tiktaskandha (bitter herb group)
        - Susruta Samhita: Aragwadhadi, Guduchyadi groups
      key_indications_ayurveda:
        - Kushtha (skin diseases, leprosy)
        - Jwara (fever)
        - Prameha (diabetes/metabolic disorders)
        - Krimi (intestinal worms)
        - Vrana (ulcers/wounds)
        - Kandu (itching)
        - Visarpa (erysipelas)
        - Raktapitta (bleeding disorders)
        - Stanya dosha (breast milk disorders)
      dosage_forms_ayurvedic:
        - form: Churna (powder)
          dose: "1-3 g twice daily"
          vehicle: warm water or honey
        - form: Kwatha (decoction)
          dose: "50-100 ml twice daily"
          preparation: "Boil 5-10 g in 200 ml water, reduce to half"
        - form: Svarasa (fresh juice)
          dose: "10-20 ml"
        - form: Lepa (paste)
          dose: "10-20 g"
          route: topical
        - form: Taila (oil)
          dose: "5-10 drops internal; apply topically"
        - form: Vati (tablet)
          dose: "500 mg extract, 1-2 tablets twice daily"
      classical_formulations:
        - Nimbadi Churna
        - Pancha Nimba Churna
        - Nimbamritasavam (fermented decoction)
        - Pancatikta Ghrita (medicated ghee)
        - Arogyavardhini Vati
        - Mahasudarshana Churna
        - Nimbaharidra Khanda
        - Nimbarishta

    - system: Siddha
      traditions:
        - Known as Vemmu / Vembu / Veppan
        - Bark decoctions used for skin eruptions
        - Believed to have dobhrvagni (sharp digestive fire) that burns toxins

    - system: Unani
      traditions:
        - Known as Azad-Darakht-e-Hindi
        - Used for blood purification, skin diseases, fevers
        - Classical preparation: Habb-e-Nimba

  # --- Modern Therapeutic Categories ---
  modern_therapeutic_categories:
    - category: Antimicrobial
      details:
        - Antibacterial (broad-spectrum, Gram-positive and Gram-negative)
        - Antiviral (including HCV NS3 protease inhibition)
        - Antifungal (including Aspergillus flavus, dermatophytes)
        - Antiparasitic (antimalarial, antileishmanial, anthelmintic)
        - Key compounds: azadirachtin, nimbin, nimbidin, gedunin
    - category: Antidiabetic
      details:
        - Multiple RCTs show hypoglycemic effect
        - Reduces PPBS, FBS, HbA1c, insulin resistance
        - Adjunctive to metformin therapy
    - category: Anti-inflammatory
      details:
        - Modulates NF-κB, TNF-α, IL-6 pathways
        - Dose-dependent edema suppression in animal models
        - Weaker than standard NSAIDs but with broader safety margin
    - category: Anticancer / Chemopreventive
      details:
        - In vitro activity against breast, cervical, colon, prostate cancer cells
        - Enhances phase II detoxifying enzymes
        - Compounds: nimbolide, gedunin, azadirachtin, quercetin
        - No published Phase II/III human trials for systemic cancers
    - category: Immunomodulatory
      details:
        - Enhances macrophage phagocytosis
        - Promotes M2 macrophage polarization (tissue repair)
        - Suppresses pro-inflammatory M1 phenotype
        - Balances ROS and NO production
    - category: Oral Health
      details:
        - Anti-plaque, anti-gingivitis
        - Reduces periodontal pocket depth
        - Active against P. gingivalis, T. denticola, T. forsythia
        - Traditional use: chewing sticks (datun)
    - category: Dermatological
      details:
        - Antiacne, anti-psoriatic, anti-eczema
        - Wound healing
        - Antipruritic
    - category: Neuroprotective
      details:
        - Experimental models of Alzheimer's and Parkinson's
        - Antioxidant activity via Nrf2 pathway
        - Limited human evidence
    - category: Cardiovascular
      details:
        - Cardioprotective in preclinical models
        - Endothelial function improvement in T2DM (RCT)
        - No effect on lipid profile or platelet aggregation in human studies
    - category: Hepatoprotective
      details:
        - Preclinical evidence only
        - Conflicting: neem oil also associated with hepatotoxicity at high doses
    - category: Antifertility / Reproductive
      details:
        - Reversible antifertility in both male and female mammals
        - Intra-vaginal neem oil used as traditional contraceptive
        - Uterine stimulant effects in labour
        - Consistent finding across animal studies

  # --- Mechanisms of Action ---
  mechanisms_of_action:
    - mechanism: NF-κB Pathway Modulation
      compound: nimbolide, gedunin
      effect: Suppresses pro-inflammatory cytokine production (TNF-α, IL-6)
      evidence_level: "Preclinical (in vitro + in vivo)"
      source_doi: "10.1016/j.semcancer.2016.03.002"
    - mechanism: PI3K/Akt/mTOR Inhibition
      compound: nimbolide
      effect: Anti-proliferative and pro-apoptotic in cancer cell lines
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1016/j.semcancer.2016.03.002"
    - mechanism: Nrf2 Activation
      compound: quercetin, catechins
      effect: Antioxidant response element activation, phase II enzyme induction
      evidence_level: "Preclinical (in vitro + in vivo)"
    - mechanism: MAPK Pathway Modulation
      compound: azadirachtin, gedunin
      effect: Cell cycle arrest, apoptosis induction
      evidence_level: "Preclinical (in vitro)"
    - mechanism: NS3 Protease Inhibition
      compound: 3-Deacetyl-3-cinnamoyl-azadirachtin
      effect: Reduces HCV viral replication
      evidence_level: "Preclinical (in vitro)"
      source_doi: "10.1002/ptr.6076"
    - mechanism: Mitochondrial Uncoupling
      compound: neem oil components
      effect: Uncouples oxidative phosphorylation, inhibits respiratory chain (toxicity mechanism)
      evidence_level: "Animal studies"
    - mechanism: Ecdysone Mimicry
      compound: azadirachtin
      effect: Disrupts insect molting and metamorphosis (pesticidal action)
      evidence_level: "Well-established"

  # --- Safety Profile ---
  safety_profile:
    toxicity_data:
      - parameter: "LD50 (neem oil, oral, rat)"
        value: "14 mL/kg"
        source_doi: "10.1016/S0378-8741(04)00249-1"
      - parameter: "LD50 (neem oil, oral, rabbit)"
        value: "24 mL/kg"
        source_doi: "10.1016/S0378-8741(04)00249-1"
      - parameter: "LD50 (neem oil, oral, mouse)"
        value: "31.95 g/kg"
        source_doi: "10.1016/S1382-6689(12)00216-5"
      - parameter: "LD50 (aqueous leaf extract, oral, rat)"
        value: ">5000 mg/kg"
        source_doi: "PMC7825405"
      - parameter: "Estimated safe dose (azadirachtin)"
        value: "15 mg/kg bw/day"
        source_doi: "10.1016/S0378-8741(04)00249-1"
      - parameter: "Estimated safe dose (neem oil)"
        value: "0.26 mg/kg bw/day"
        source_doi: "10.1016/S0378-8741(04)00249-1"
      - parameter: "Estimated safe dose (aqueous extracts)"
        value: "0.3 mg/kg bw/day"
        source_doi: "10.1016/S0378-8741(04)00249-1"

    adverse_effects:
      - severity: Serious
        effects:
          - Pediatric encephalopathy / Reye-like syndrome (neem oil ingestion, 5-30 mL in infants)
          - Metabolic acidosis, seizures, coma, death
          - Hepatotoxicity / hepatic encephalopathy
          - Bilateral vision loss (150 mL neem oil, adult case report)
        population: "Infants, children, and high-dose adult cases"
        evidence_level: "Case reports, case series"
      - severity: Moderate
        effects:
          - Vomiting, drowsiness, diarrhea
          - Metabolic acidosis
          - Encephalopathy
        population: "Adults (acute overdose)"
        evidence_level: "Case reports"
      - severity: Mild
        effects:
          - Skin/eye irritation (topical)
          - Mild GI upset
        population: "General (therapeutic doses)"
        evidence_level: "Clinical trials"

    contraindications:
      - Pregnancy (embryotoxicity in animal studies, uterine stimulant)
      - Lactation (insufficient safety data)
      - Children <2 years (neem oil, risk of encephalopathy)
      - Pre-existing liver disease
      - Male/female partners planning conception (reversible antifertility)

    drug_interactions:
      - Antidiabetic drugs (additive hypoglycemic effect)
      - Immunosuppressants (potential immunostimulatory counteraction)
      - Anticoagulants (theoretical; limited evidence)

  # --- Source DOIs for Therapeutic Applications ---
  source_dois_therapeutic:
    - "10.1155/2016/7382506"            # Alzohairy 2016 – comprehensive review
    - "10.1002/ptr.6076"                # Phytotherapy Research review
    - "10.1016/j.semcancer.2016.03.002" # Patel et al. 2016 – oncologic
    - "10.1016/j.phymed.2017.07.001"    # Gupta et al. 2017 – modern molecular basis
