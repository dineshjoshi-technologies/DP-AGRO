# SECTION 3 — REGULATORY & COMPLIANCE STATUS
# =============================================================================
regulatory_status:

  india:
    - authority: "AYUSH (Ministry of Ayush)"
      status: "Regulated as traditional medicine under Drugs & Cosmetics Act, 1940 and Rules, 1945"
      approved_claims: "Therapeutic claims allowed when marketed as Ayurvedic drug (ASU category)"
      restrictions: "Must be manufactured under GMP license from State/Central Drug Controller under AYUSH"
      classification: "Classical Ayurvedic herb; multiple formulations in Ayurvedic Pharmacopoeia"
      notes: "Over 150+ ASU formulations containing Neem are listed"
    - authority: "FSSAI (Food Safety and Standards Authority of India)"
      status: "Permitted botanical under FSS (Health Supplements, Nutraceuticals…) Regulations, 2016"
      approved_claims: "Structure/function claims only ('supports skin health', 'natural antioxidants')"
      restrictions: "No disease claims allowed on food products; requires product approval"
      max_permitted_levels: "By product approval; no universal MPL established"
      notes: "Neem is a well-known herb; traditional use documentation accepted for safety"

  united_states:
    - authority: "FDA (Food and Drug Administration)"
      regulatory_pathway: "Dietary Supplement under DSHEA 1994"
      premarket_approval: "Not required"
      approved_claims: "Structure/function claims only; no disease prevention/treatment claims"
      gras_status: "Neem oil fatty acids considered GRAS; neem leaf/bark extracts not established as GRAS"
      drug_status: "Not FDA-approved as a drug for any indication"
      restrictions: "Cannot be marketed to diagnose, treat, cure or prevent disease without NDA"
      ndi_requirements: "New Dietary Ingredient notification may apply for novel extracts"
      fda_warning: "FDA has not evaluated neem supplements for safety/effectiveness"
      notes: "Ayurvedic products not specifically defined under US law; case-by-case determination"

  european_union:
    - authority: "EMA (European Medicines Agency) / HMPC"
      regulatory_pathway: "Traditional Herbal Medicinal Product (THMPD) or food supplement"
      thmp_requirements: "30 years traditional use (including 15 years in EU); safety and efficacy dossier"
      approved_claims: "THMP registration for specific traditional uses"
      status: "Some neem products marketed as food supplements; not systematically authorized as THMP"
    - authority: "EFSA (European Food Safety Authority) / Novel Food"
      status: "Neem extracts not on EU Novel Food list (Regulation EU 2015/2283)"
      restrictions: "Novel food authorization needed if no history of consumption before May 1997"
      permitted_use: "Food supplement use may be permitted under certain conditions"
      notes: "Regulatory status for neem in food is complex and case-dependent"

  japan:
    - authority: "MHLW (Ministry of Health, Labour and Welfare)"
      status: "Neem is not listed in the Japanese Pharmacopoeia; regulated as non-medicinal"
      restrictions: "Limited use; some neem oil in cosmetics"

  china:
    - authority: "NMPA (National Medical Products Administration)"
      status: "Not listed in Chinese Pharmacopoeia; limited traditional use"
      notes: "Growing interest for biopesticide application"

  iucn_cites:
    iucn_status: "Least Concern"
    cites: "Not listed (unrestricted international trade)"
    source: "ITTO Tropical Timber Database; IUCN Red List"

  patent_landscape:
    summary: >
      Over 540+ patents related to azadirachtin globally (PatSnap analysis).
      Key patent clusters: (1) Azadirachtin formulations for biopesticides,
      (2) Nimbolide enrichment via supercritical CO2 extraction,
      (3) Nanoencapsulation and controlled-release delivery systems.
    major_patent_holders:
      - Certis USA LLC
      - Bayer CropScience NV
      - Coromandel International Ltd
      - Council of Scientific & Industrial Research (CSIR, India)
      - South China Agricultural University
    recent_patents:
      - patent_id: WO2022149077A1
        title: "Azadirachtin formulations and process for preparing and use thereof"
        assignee: Coromandel International Ltd
        year: 2022
        focus: "Microemulsion formulation with improved stability"
      - patent_id: EP4342482A1
        title: "Neem tree leaves extract"
        assignee: Individual (EU)
        year: 2024
        focus: "Nimbolide-enriched, azadirachtin-depleted extract via supercritical CO2"
        status: Withdrawn
    freedom_to_operate: >
      Moderate. Base compounds (azadirachtin, nimbin) are not patentable as natural
      products; however, specific extraction methods, formulations, and delivery
      systems are covered by active patents. Freedom-to-operate analysis is
      recommended before commercialization of novel formulations or delivery technologies.

