metadata:
  plant: Azadirachta indica (Neem)
  date: '2026-06-29'
  version: '1.0'
  researcher: Botanical Research Agent (AI-assisted)
  confidence_legend:
    high: Multiple peer-reviewed sources with consensus
    medium: Limited studies or some variability in findings
    low: Single study, preliminary evidence, or extrapolated data
botanical_and_taxonomic_profile:
  scientific_name: Azadirachta indica A.Juss.
  authority: 'Adrien-Henri de Jussieu, 1830 (Mem. Mus. Hist. Nat. 19: 221)'
  synonyms:
  - Melia azadirachta L. (basionym)
  - Antelaea azadirachta (L.) Adelb.
  - Melia indica (A.Juss.) Brandis
  - Azadirachta indica subsp. vartakii Kothari, Londhe & N.P.Singh
  family: Meliaceae (Mahogany family)
  genus: Azadirachta
  species: Azadirachta indica
  taxonomic_rank: Species
  ncbi_taxonomy_id: 124943
  classification:
    kingdom: Plantae
    clade:
    - Angiosperms
    - Eudicots
    - Rosids
    order: Sapindales
    family: Meliaceae
    genus: Azadirachta
  common_names:
    english:
    - Neem
    - Margosa
    - Nimtree
    - Indian Lilac
    sanskrit:
    - Nimba
    - Arishta
    - Paribhadra
    hindi:
    - Neem
    - Nim
    tamil:
    - Vempu
    - Veppam
    telugu:
    - Vepa
    - Nimbamu
    - Picumandamu
    bengali:
    - Neem
    marathi:
    - Neem
