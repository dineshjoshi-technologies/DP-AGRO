    - Leaf (Nimba Leaf)
    - Stem Bark (Nimba Stem Bark)
    - Root Bark (Nimba Root Bark)
    - Flower (Nimba Flower)
    - Fruit (Nimba Fruit)
    volumes:
    - Part I, Vol. II (Leaf, Stem Bark)
    - Part I, Vol. V (Root Bark, Flower, Fruit)
    jurisdiction: India, Ministry of AYUSH
  - name: Indian Pharmacopoeia (IP)
    scope: Physicochemical parameters; monograph for neem-based pharmaceuticals
    year: '2022'
    jurisdiction: Indian Pharmacopoeia Commission
  - name: WHO Monographs on Selected Medicinal Plants
    scope: Quality control methods for medicinal plant materials
    jurisdiction: World Health Organization
  - name: Bureau of Indian Standards (BIS)
    standards:
    - 'IS 14300 (1995): Neem Based EC Containing Azadirachtin'
    - 'IS 18202 (2023): Nimba A. indica Fruit for Traditional Medicine'
    - 'IS 548 (1964): Methods for oils and fats'
    jurisdiction: India
  organoleptic_characteristics:
    leaf:
      color: Green (dark green upper, lighter below)
      odor: Characteristic, pungent, garlic-like when crushed
      taste: Intensely bitter
      texture: Glabrous, serrate margin
    stem_bark:
      color: Dark grey externally, reddish internally
      odor: Characteristic, foetid (freshly cut)
      taste: Bitter, astringent
    seed_kernel:
      color: Yellowish-white to light brown
      odor: Characteristic, pungent (garlic-like)
      taste: Intensely bitter
    neem_oil:
      color: Light to dark brown (viscous liquid)
      odor: Repulsive, characteristic
      taste: Bitter
    fruit:
      color: Greenish-yellow to yellow when ripe
      odor: Characteristic
      taste: Bitter-sweet (pulp), very bitter (seed)
    flower:
      color: White to cream
      odor: Slightly sweet, fragrant
      taste: Bitter
  physicochemical_parameters:
    leaf_powder_API_standards:
      foreign_matter: NMT 2%
      total_ash: NMT 10.0%
      acid_insoluble_ash: NMT 2.0%
      alcohol_soluble_extractive: NLT 6.0%
      water_soluble_extractive: NLT 19.0%
      loss_on_drying: NMT 12.0%
      confidence: high
    leaf_observed_values_2023_study:
      source: 'Yadav A.N. et al. (2023) DOI: 10.5530/pres.15.2.026'
      total_ash: 9.89 +/- 0.23%
      acid_insoluble_ash: 1.48 +/- 0.01%
      alcohol_soluble_extractive: 7.69 +/- 0.25%
      water_soluble_extractive: 11.25 +/- 0.33%
      loss_on_drying: 9.72 +/- 0.5%
      compliance: Complies with IP 2022 limits
    neem_oil_BIS_standards:
      moisture_and_insoluble_impurities: NMT 0.3% (kernel), NMT 0.5% (depulped)
      color_Y_plus_5R: NMT 45 (kernel), NMT 55 (depulped)
      refractive_index_at_40C: 1.4615 (kernel), 1.4705 (depulped)
