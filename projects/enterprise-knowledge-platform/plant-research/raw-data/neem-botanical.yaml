  data_gaps_and_follow_up:
  - Comprehensive multi-year azadirachtin variability study across global provenances would strengthen concentration benchmarks
  - Standardized A/B/C grading system for neem seed quality by industry bodies not yet universally adopted
  - Heavy metal and microbial limits specific to neem leaf/bark/seed in all pharmacopoeias need compilation
  - Long-term storage stability data for nimbin, salannin, and gedunin less documented than azadirachtin
  - Clinical validation of synergistic ratios of multiple limonoids for enhanced efficacy
