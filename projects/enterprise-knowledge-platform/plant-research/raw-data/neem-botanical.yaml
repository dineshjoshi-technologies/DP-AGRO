  - 'Kumar L. & Parmar B.S. (2000). Effect of emulsion size and shelf life. J Agric Food Chem. DOI: 10.1021/jf9911141'
  - 'Kumar J. & Parmar B.S. (1999). Stabilization of Azadirachtin A. J Agric Food Chem. DOI: 10.1021/jf980667t'
  - 'Song L. et al. (2018). Simultaneous determination of five azadirachtins. BMC Chemistry. DOI: 10.1186/s13065-018-0453-y'
  - 'Ghimeray A.K. et al. (2009). Antioxidant activity and quantitative estimation. Afr J Biotechnol. 8(13). DOI: 10.4314/ajb.v8i13.60994'
  - 'Elteraifi I.E. & Hassanali A. (2011). Oil and Azadirachtin contents. Int J Biol Chem Sci. DOI: 10.4314/ijbcs.v5i3.72211'
