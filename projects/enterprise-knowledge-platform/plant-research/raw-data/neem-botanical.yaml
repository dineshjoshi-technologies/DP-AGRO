    punjabi:
    - Nimm
    urdu:
    - Neem
    persian:
    - Azad darakhat-e-hind
    arabic:
    - Nim
    - Nem
  morphology:
    growth_habit: Small to medium-sized evergreen tree, sometimes deciduous in severe drought
    height:
      typical: 15-20 m
      maximum: 35-40 m (rare)
    crown: Round, dense, spreading, 10-20 m diameter
    trunk:
      diameter: Up to 90 cm
      bark: Moderately thick, dark grey outside, reddish inside, deeply fissured and flaking in old trees, produces colorless sticky foetid sap
    leaves:
      type: Alternate, simply pinnate, crowded near branch ends
      length: 20-40 cm
      leaflet_count: 8-19
      leaflet_description: Ovate to lanceolate, sometimes falcate, 3.5-10 x 1.2-4 cm, serrate margin, acuminate apex, unequal base
      color: Light to medium green, glossy
    flowers:
      inflorescence: Axillary, many-flowered drooping panicles, up to 25-35 cm long
      flower_count: 150-250 per panicle
      symmetry: Actinomorphic, bisexual or male on same tree (polygamous)
      size: 5-6 mm long, 8-11 mm wide
      color: White to pale yellow
      fragrance: Slightly sweet, honey-like
      calyx: 5-lobed, imbricate, broadly ovate
      petals: 5, free, imbricate, spathulate
      staminal_tube: Cylindrical, terminating in 10 appendages
      ovary: 3-locular, 2 ovules per locule
      stigma: 3-lobed, cream-colored
    fruit:
      type: Drupe, 1-2 seeded
      shape: Ellipsoidal to ovoid
      size: 1.0-2.0 cm long
      color: Greenish to yellow or purple when ripe
      exocarp: Thin
      mesocarp: Pulpy, yellowish-white, fibrous, bitter-sweet
      endocarp: Cartilaginous
    seed:
      shape: Ovoid or spherical with pointed apex
      testa: Thin, composed of shell and kernel (each ~50% of seed weight)
      seeds_per_kg: 4000-4500
    root_system: Deep taproot, extensive lateral roots
  native_range:
    region: Indian subcontinent and Southeast Asia
    countries:
    - India
    - Pakistan
    - Sri Lanka
    - Bangladesh
    - Myanmar
    - Thailand
    - Indonesia
    - Malaysia
    habitat: Mixed forests with Acacia spp. and Dalbergia sissoo; lowland monsoon forests
  current_distribution:
    status: Naturalized and cultivated pantropically
    regions:
    - Tropical and subtropical Africa
    - Middle East (Saudi Arabia, Yemen)
    - Australia (Northern)
    - Caribbean
    - Central and South America
    - Pacific Islands
    elevation_range: 0-1500 m
  varieties_and_subspecies:
  - name: Azadirachta indica var. minor Valeton
    notes: Sometimes recognized in Southeast Asia; generally considered a synonym
    confidence: low
  - name: Azadirachta indica var. siamensis Valeton
    notes: Thai variant; generally considered a synonym
    confidence: low
  - name: Azadirachta indica subsp. vartakii Kothari, Londhe & N.P.Singh
    notes: Described from India; taxonomic status uncertain, treated as synonym by POWO
    confidence: low
  phenology:
    flowering_season:
      india: February-May (varies by region)
      thailand: Year-round
      east_africa: Restricted to wet season (distinct)
      confidence: high
    fruiting_period:
      fruit_development: ~12 weeks from anthesis
      india: May-August (peak June-July)
      confidence: high
    optimal_harvest_window:
      seeds: When fruits turn yellow-green to yellow, before full ripening and dispersal
      leaves: Year-round; highest bioactive content during active growth periods
      confidence: medium
    age_at_first_fruiting: 4-5 years (economical quantities at 10-12 years)
    lifespan: 150-200 years; productive up to 40-50 years
  pollination: Entomophilous (honeybees, other insects); self-incompatibility reported in some trees
  seed_dispersal: Bats, birds
  differentiation_from_lookalikes:
    species: Melia azedarach (Chinaberry)
    key_differences:
    - A. indica has unipinnate leaves; M. azedarach has bipinnate leaves
    - A. indica has white/cream flowers; M. azedarach has lilac flowers
    - A. indica fruits are ellipsoidal yellow-green; M. azedarach fruits are spherical yellow
  sources:
  - POWO (Plants of the World Online). Azadirachta indica A.Juss. https://powo.science.kew.org/taxon/urn:lsid:ipni.org:names:1213180-2
  - ITIS Report. Azadirachta indica A. Juss. Taxonomic Serial No. 29012. https://www.itis.gov
  - Schmutterer H. (1995). The Neem Tree. VCH Verlagsgesellschaft.
  - World Agroforestry. Azadirachta indica species profile. https://apps.worldagroforestry.org/treedb2/speciesprofile.php?Spid=271
  - 'Schoch CL, et al. (2020). NCBI Taxonomy: a comprehensive update. Database. DOI: 10.1093/database/baaa062'
active_chemical_compounds:
  primary_bioactive_class: Limonoids (tetranortriterpenoids)
  total_identified_compounds: '>300 phytochemicals identified'
  compound_families:
  - Limonoids (azadirachtins, nimbin, salannin, gedunin, azadiradione)
  - Flavonoids (quercetin, rutin, kaempferol)
  - Phenolic acids (gallic acid, gallocatechin, epicatechin)
  - Steroids (beta-sitosterol, stigmasterol)
  - Fatty acids (oleic, palmitic, stearic, linoleic)
  - Alkaloids
  - Tannins
  - Carbohydrates
  key_compounds:
  - name: Azadirachtin A
    type: Limonoid (C-seco meliacin)
    molecular_formula: C35H44O16
    molecular_weight: 720.71 g/mol
    role: Primary insecticidal compound; antifeedant, growth regulator, ecdysone antagonist
    evidence_type: scientific_consensus
    concentrations_by_plant_part:
      seed_kernel: 0.3-0.5% (3000-5419 ug/g dry weight) highest
      seed_kernel_range_across_provenances: 0.48-4.0 mg/g dry weight
      leaf: 182-970 ug/g dry weight
      bark: Trace to low
      callus: ~0.25 ug/g
    confidence_concentration: high
    stability:
      photostability:
        half_life_UV_thin_film: 48 minutes
        half_life_sunlight_thin_film: 3.98 days
        half_life_leaf_surface: 2.47 days
      thermal_stability:
        half_life_at_54C_formulation: 1.84-4.53 days
        half_life_methanol_50C: 6.96 days
        half_life_methanol_90C: 11.7 hours
      pH_stability:
        most_stable: pH 4-6 (mildly acidic)
        half_life_at_30C_pH4: 10.7 days
        half_life_at_30C_pH7: 4.8 days
        half_life_at_30C_pH8: 0.96 days
      storage_recommendations:
      - Store in brown/amber bottles (protects from UV)
      - Refrigerated or room temperature storage preferred
      - Avoid exposure to sunlight, moisture, and alkaline conditions
      - Use stabilizers (8-hydroxy quinoline, tert-butyl hydroquinone) to extend shelf life
      confidence_stability: high
  - name: Nimbin
    type: Limonoid
    molecular_formula: C30H36O9
    role: Anti-inflammatory, antiviral, spermicidal; contributes to bitter taste
    evidence_type: scientific_consensus
    concentrations_by_plant_part:
      bark_hexane_fraction: 271 ug/g dry weight
      seed: Moderate
      leaf: Present
    confidence_concentration: medium
  - name: Salannin
    type: Limonoid
    role: Insect repellent, antifeedant
    evidence_type: scientific_consensus
    concentrations_by_plant_part:
      seed: Moderate
      leaf: Present
    confidence_concentration: medium
  - name: Nimbidin
    type: Limonoid (sulfur-containing)
    role: Antibacterial, anti-inflammatory, anti-ulcer, spermicidal
    evidence_type: scientific_consensus
    primary_source: Seed oil
    confidence: medium
  - name: Gedunin
    type: Limonoid
    role: Anticancer, antimalarial, anti-inflammatory
    evidence_type: scientific_consensus
    primary_source: Seed, bark
    confidence: medium
  - name: Nimbolide
    type: Limonoid
    role: Anticarcinogenic, antimicrobial, anti-inflammatory
    evidence_type: scientific_consensus
    primary_source: Leaf, seed
    confidence: medium
  - name: Azadiradione
    type: Limonoid
    role: Anticancer, anti-inflammatory
    evidence_type: scientific_consensus
    concentrations_by_plant_part:
      leaf: Present
      seed: High
      bark: Present
    confidence: medium
  - name: Epoxy/hydroxy-azadiradione (E/H-Azadi)
    type: Limonoid
    role: Most abundant neem metabolite in leaf extracts; multifunctional properties
    evidence_type: scientific_consensus
    concentrations_by_plant_part:
      leaf: 124239 pg/ug (~10% of leaf extract)
      bark: 906.97 pg/ug
      seed: 7309.48 pg/ug
    notes: ~136-fold higher in leaf than bark; most abundant metabolite in neem leaf
    confidence: medium
  - name: Quercetin
    type: Flavonoid
    role: Antioxidant, anti-inflammatory, antidiabetic
    evidence_type: scientific_consensus
    primary_source: Leaf
    confidence: medium
  - name: Rutin
    type: Flavonoid glycoside
    role: Antioxidant, anti-inflammatory
    evidence_type: scientific_consensus
    primary_source: Leaf
    confidence: medium
  neem_oil_composition:
    oil_content_in_kernel: 44-53% w/w
    fatty_acid_profile:
      oleic_acid: ~58%
      stearic_acid: ~15%
      palmitic_acid: ~14%
      linoleic_acid: Trace
      myristic_acid: Trace
      arachidic_acid: Trace
      behenic_acid: Trace
    confidence: high
  standardization_markers:
    values:
    - Azadirachtin A (primary marker for quality control in biopesticides)
    - Nimbin
    - Salannin
    - Quercetin (pharmacopoeial marker for leaf)
    - Rutin (pharmacopoeial marker for leaf)
    confidence: high
  known_synergistic_interactions:
  - description: Azadirachtin + salannin + nimbin produce enhanced antifeedant effects vs. individual compounds
    evidence_type: scientific_consensus
    confidence: medium
  - description: Multiple limonoids in crude neem extract show greater bioactivity than purified azadirachtin alone
    evidence_type: scientific_consensus
    confidence: medium
  - description: Neem oil acts as natural stabilizer for azadirachtin, reducing degradation rate compared to purified compound on solid carriers
    evidence: 'Kumar & Parmar (1999) DOI: 10.1021/jf980667t'
    confidence: high
  compound_stability_summary:
    factor_light: Highly photolabile; UV light causes rapid degradation (half-life 48 min as thin film)
    factor_temperature: Degrades faster at elevated temperatures; stable at refrigerated or room temperature
    factor_pH: Most stable at pH 4-6; degrades rapidly in alkaline conditions
    factor_oxygen: Oxygen accelerates photodegradation
    factor_moisture: Liable in presence of moisture
    shelf_life_formulations:
    - 'NeemAzal T/S commercial formulation: stable up to 24 months under recommended storage'
    - 'Emulsifiable concentrates: significant degradation at 54C (96-99% in 14 days)'
    - 'Neem oil: shelf life 24 months (BIS/Indian standards)'
  sources:
