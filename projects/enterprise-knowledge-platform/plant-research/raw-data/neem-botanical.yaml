cultivation_requirements:
  climate:
    type: Tropical/subtropical
    optimal_temperature: 21-32 C
    maximum_temperature: Up to 50 C (heat tolerant)
    minimum_temperature: 4 C (frost sensitive, especially seedlings)
    frost_tolerance: None (seedlings highly sensitive; mature trees can tolerate light frost)
    annual_rainfall_optimal: 400-1200 mm
    drought_tolerance: High (once established; deep taproot accesses groundwater)
    tolerance_to_waterlogging: Very low (quickly dies in waterlogged soils)
    altitude_range: 0-1500 m
    light_requirement: Full sunlight for best performance; tolerates partial shade in first 1-3 years
  soil:
    pH_optimal: 6.2-7.0
    pH_tolerable: 5.0-8.5
    pH_notes: Thrives on neutral to alkaline soils; calcium-rich leaf litter raises soil pH
    texture:
    - Sandy
    - Sandy loam
    - Laterite
    - Clay loam
    - Black cotton soil
    drainage: Essential - does not tolerate waterlogging or poor drainage
    tolerant_soils:
    - Dry stony
    - Shallow
    - Calcareous
    - Saline
    - Alkaline
    intolerant_soils:
    - Silty clays with slow drainage
    - Sodic soils
    - Soils with high or fluctuating water table
    organic_matter: Responds well to organic amendments but not strictly required
    calcium_mining: Unique property of mining calcium from deep soil layers, neutralizing soil acidity via alkaline leaf litter
  propagation:
    seed:
      viability: Recalcitrant; rapidly loses viability (85% to 60% after 1 month storage at room temperature)
      germination_rate: 70-90% when fresh
      germination_time: 5-14 days
      seed_treatment: Remove pulp; sow fresh; soak in water 12-24h before sowing
      sowing_depth: 1-1.5 cm
      seeds_per_kg: 4000-4500
      storage_behavior: Intermediate; cannot be stored long-term under conventional conditions
    vegetative_propagation:
      cuttings: Possible but limited success; root formation variable
      air_layering: Possible but not commercial scale
      grafting: Possible for elite genotype multiplication
    tissue_culture:
      methods:
      - Nodal segments
      - Leaf explants
      - Callus culture
      - Anther culture
      notes: Used for rapid clonal propagation of high-azadirachtin genotypes; genetic improvement programs
      confidence: medium
  planting:
    season: Monsoon/rainy season (July-September in India); spring in other regions
    pit_size: 30-45 cm3 (depending on soil moisture)
    pit_filling: Native soil + 5 kg FYM + 25-50 g DAP per pit
    spacing:
      block_plantation_dense: 5 x 5 m (400 trees/ha)
      block_plantation_standard: 6 x 6 m (280 trees/ha)
      agroforestry_wide: 7 x 7 m to 10 x 10 m (200-100 trees/ha)
      farm_forestry: 5 x 5 m (400 trees/ha)
    seedling_age_at_transplanting: 4-12 months old, 15-45 cm tall
    planting_density_notes: Wider spacing recommended for poorer quality sites; closer spacing for timber production
  irrigation:
    establishment_phase: Irrigation every 5-10 days for first 1-2 years
    mature_trees: Minimal to none; deep taproot accesses subsoil moisture
    drought_tolerance: Excellent once established; survives on 400 mm annual rainfall
    irrigation_methods: Drip or basin irrigation efficient; conserve moisture with mulching
    notes: High irrigation levels do not significantly improve growth; mulch application beneficial
  fertilizer_and_nutrients:
    general_requirement: Low - neem is adapted to poor soils
    at_planting: 5 kg FYM + 25-50 g DAP per pit
    established_trees: Responds well to chemical and organic fertilizers if applied
    NPK_demand: Low (N low, P low, K low)
    organic_practice: FYM or compost sufficient; neem leaf litter self-fertilizes
  intercropping_compatibility:
    compatible_crops:
    - Millet
    - Sorghum
    - Pulses
    - Other annual crops (agri-silviculture)
    notes: Deep taproot minimizes competition with shallow-rooted crops; wider spacing (7x7 m or more) required
    windbreak_benefit: Neem windbreaks increase crop yields by 15%+ (Niger study)
    systems:
    - Agri-silviculture
    - Agri-silvi-horticulture
    - Silvi-pastoral
    - Windbreaks/shelterbelts
  pest_and_disease_management:
    common_pests:
    - name: Tea mosquito bug (Helopeltis spp.)
      control: Neem-based sprays; botanical insecticides
    - name: Neem scale (Pinnaspis strachani)
      control: Natural predators; neem oil spray
    - name: Defoliating caterpillars
      control: Bacillus thuringiensis; neem seed kernel extract
    - name: Termites
      control: Soil drench with neem oil; Bursbon treatment in planting pits
    common_diseases:
    - name: Powdery mildew (Oidium spp.)
      control: Sulfur spray; neem leaf extract
    - name: Root rot (Fusarium, Phytophthora spp.)
      control: Improve drainage; avoid waterlogging; biocontrol agents
    - name: Leaf spot (Cercospora, Colletotrichum spp.)
      control: Remove infected leaves; copper-based fungicides
    organic_control_methods:
    - Neem seed kernel extract (NSKE) 5% for general pest management
    - Neem oil 2-3% spray for scale insects and mites
    - Azadirachtin-based commercial biopesticides
    - Soil application of neem cake (250 kg/ha) for nematode control
    - Trichoderma spp. for soil-borne disease suppression
    inherent_resistance: Neem produces its own insecticidal compounds; generally pest-hardy
  harvesting:
    maturity_indicators:
      seeds_fruits: Fruits turn from green to yellow-green/yellow; slight softening
      leaves: Year-round; best during active growth
    harvest_method:
      seeds: Collect fallen fruits manually or shake branches onto sheets; depulp immediately
      leaves: Hand plucking or branch cutting; avoid stripping all leaves from one tree
    season:
      india: May-August (peak June-July)
      east_africa: Wet season (distinct periods)
      thailand: Year-round
    frequency: Annual (once per year for seeds)
    yield_per_tree:
      initial_5th_year: 5-10 kg seeds/tree
      mature_10th_year: 20-25 kg seeds/tree
      stabilized_20_25_years: 35-58 kg seeds/tree
    yield_per_hectare:
      seed: 5000-11750 kg/ha (depending on spacing and tree age)
      timber: 108-137 m3/ha (at 35-40 year rotation)
    yield_confidence: high
    tree_production_lifespan: Economically viable up to 40-50 years
  post_harvest_handling:
    depulping: Remove fruit pulp manually or mechanically; pulp:seed ratio ~2:1
    seed_drying: Shade dry for 3-7 days to ~8-10% moisture; avoid sun drying to preserve azadirachtin
    seed_storage: Store in cool, dry, dark conditions; viability limited (recalcitrant); process oil extraction within weeks
    leaf_drying: Shade dry in thin layers at <40 C
    bark_drying: Sun dry after collection; store in moisture-proof containers
    processing_for_oil:
    - Mechanical pressing (cold press preferred for oil quality)
    - Solvent extraction (n-hexane or ethanol; binary solvent 50:50 gives highest yield)
    - Supercritical fluid extraction (emerging technology)
    oil_storage: Store in amber glass or HDPE containers; away from light and heat; shelf life ~24 months
    quality_preservation: Add stabilizers/antioxidants for azadirachtin preservation; store at 4-15 C
  growth_rates:
    height_at_5_years: ~4 m
    height_at_10_years: 6-7 m
    height_at_25_years: ~10 m
    mean_annual_girth_increment: 2.3-3.0 cm
    notes: Growth rate varies significantly with site quality; faster growth on deep, fertile, well-drained soils
  sources:
  - 'TNAU Agritech Portal. Biofuels: Neem. https://agritech.tnau.ac.in/bio-fuels/Biofuel_Neem.html'
  - World Agroforestry. Azadirachta indica. https://apps.worldagroforestry.org/treedb2/speciesprofile.php?Spid=271
  - 'National Research Council (1992). Neem: A Tree for Solving Global Problems. National Academies Press.'
  - Schmutterer H. (1995). The Neem Tree. VCH Verlagsgesellschaft.
  - Divakaran A. et al. (2019). Factors Influencing Establishment of Neem Plantations. IJCMAS. 8(11).
  - DFID R7348 Report. Improvement of neem and its potential benefits to poor farmers in developing countries.
  - IAFT. Neem Cultivation Guide. https://iaft.co.in/en/neem/
quality_grading_standards:
  pharmacopoeial_references:
