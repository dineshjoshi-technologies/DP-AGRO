  differentiation_from_lookalikes:
    species: Bidens nodosa (Water coreopsis)
    key_differences:
      - Stevia leaf serration is finer
      - Stevia flavor is sweeter (detectable even at low concentrations)
      - Flower color: stevia has cream-white vs. yellow for Bidens
chemical_composition:
  primary_bioactive_class: Terpenoid glycosides (diterpenoid steviol glycosides)
  total_identified_compounds: '>30 steviol glycosides identified'
  compound_families:
    - Steviol glycosides (stevioside, rebaudioside A-E)
    - Flavonoids (quercetin, myricetin)
    - Phenolic acids
  key_compounds:
    - name: Steviol glycosides
      type: Diterpenoid glycosides
      role: Intense sweetness (200-300x sucrose), non-caloric
      evidence_type: scientific_consensus
      concentrations_by_plant_part:
        leaves: 1-5% (dry weight)
        stems: Traces
        roots: Traces
      confidence_concentration: high
    - name: Stevioside
      type: Steviol glycoside
      molecular_formula: C38H60O18
      molecular_weight: 804.75 g/mol
      role: Sweetener (steviol glycol content > 80%)
      evidence_type: scientific_consensus
      concentrations_by_plant_part:
        leaves: 50-70% of total glycosides
      confidence_concentration: high
    - name: Rebaudioside A (Reb A)
      type: Steviol glycoside
      molecular_formula: C44H62O14
      molecular_weight: 867.03 g/mol
      role: Sweetener (up to 300x sucrose), superior taste profile
      evidence_type: scientific_consensus
      concentrations_by_plant_part:
        leaves: 2-5% of total glycosides
      confidence_concentration: medium
    - name: Ambroside
      type: Steviol glycoside
      molecular_formula: C32H56O13
      molecular_weight: 716.78 g/mol
      role: Sweetener (~300x potency), complex taste profile
      evidence_type: scientific_consensus
      concentrations_by_plant_part:
        leaves: Low (<1% of total)
      confidence_concentration: low
  oil_composition: N/A
  standardization_markers:
    values:
      - Methanol-based extract, 100x (for analysis)
      - Glycoside content % by dry weight
      - Stevioside:Reb A ratio
    confidence: high
  known_synergistic_interactions:
    - description: Combined steviol glycosides show synergistic sweetness perception.
      evidence_type: scientific_consensus
      confidence: high
