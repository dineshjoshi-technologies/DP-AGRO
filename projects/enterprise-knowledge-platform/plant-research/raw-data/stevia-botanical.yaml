data_gaps_and_follow_up:
    - Long-term human toxicity studies at industrial consumption levels.
    - Stability of steviol glycosides during long-term storage in different solvents.
    - Comparative glycoside profiles across different growing regions.
    - Standardized methods for assessing purity beyond quantitative glycosidics.
    - Mechanisms of potential interaction with gut microbiota.
    - Impact of climate change on glycoside biosynthesis pathways.